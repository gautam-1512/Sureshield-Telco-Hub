<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Geist',sans-serif;background:#f1ece0;min-height:100vh}
#searchScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#d8d2c4;padding:2rem}
.search-card{background:#f1ece0;border-radius:12px;padding:3rem 2.5rem;box-shadow:0 8px 40px rgba(0,0,0,0.18);width:100%;max-width:560px;text-align:center}
.search-card h1{font-family:'Instrument Serif',serif;font-size:2rem;color:#0a1220;font-weight:400;margin-bottom:0.5rem}
.search-card p{font-size:0.93rem;color:#5a5248;margin-bottom:2rem}
.search-wrap{position:relative}
#searchBox{width:100%;padding:0.85rem 1.1rem;padding-right:3rem;border:1.5px solid rgba(10,18,32,0.2);border-radius:8px;font-family:'Geist',sans-serif;font-size:1rem;background:#fff;outline:none;transition:border-color 0.15s}
#searchBox:focus{border-color:#c9a227}
.search-icon{position:absolute;right:1rem;top:50%;transform:translateY(-50%);color:#888;pointer-events:none;font-size:1.2rem}
#suggestions{position:absolute;top:calc(100% + 4px);left:0;right:0;background:#fff;border:1.5px solid rgba(10,18,32,0.15);border-radius:8px;max-height:280px;overflow-y:auto;z-index:100;box-shadow:0 4px 20px rgba(0,0,0,0.12);display:none}
.sug-item{padding:0.65rem 1.1rem;cursor:pointer;display:flex;flex-direction:column;gap:2px;border-bottom:1px solid rgba(10,18,32,0.06);transition:background 0.1s}
.sug-item:last-child{border-bottom:none}
.sug-item:hover,.sug-item.active{background:#f9f7f2}
.sug-name{font-size:0.93rem;font-weight:600;color:#0a1220}
.sug-meta{font-size:0.78rem;color:#7a7268;font-family:'Geist Mono',monospace}
.no-results{padding:1rem;text-align:center;color:#888;font-size:0.9rem}
.search-logos{display:flex;align-items:center;justify-content:center;gap:1.5rem;margin-bottom:1.5rem}
.search-logos img{height:32px;width:auto}
.search-logos .divider{width:1px;height:24px;background:rgba(10,18,32,0.2)}
#reportScreen{display:none;background:#d8d2c4;padding:2.5rem 0 4rem;min-height:100vh}
#reportContent{max-width:900px;margin:0 auto;background:#f1ece0;box-shadow:0 4px 40px rgba(0,0,0,0.18)}
#backBtn{display:flex;margin:0 auto 1.5rem;max-width:900px;background:none;border:none;cursor:pointer;font-family:'Geist',sans-serif;font-size:0.88rem;color:#3a3326;align-items:center;gap:0.4rem;padding:0.4rem 0;opacity:0.7;transition:opacity 0.15s}
#backBtn:hover{opacity:1}
</style>

em; line-height: 1.35; color: #0a0a0a; max-width: 640px; margin-bottom: 2.5rem; opacity: 0.85;\">Your publicly observable cyber risk indicators, measured against the average of all analyzed telecommunications operators in the same state.<\/p>\n    <div class=\"covermeta\" style=\"display: grid; grid-template-columns: repeat(4, 1fr); gap: 0; border-top: 1px solid #c9bfa6; padding-top: 1.5rem;\">\n      <div><div style=\"font-family: 'Geist Mono', monospace; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: #3a3326; margin-bottom: 0.5rem;\">State<\/div><div style=\"font-family: 'Geist', sans-serif; font-weight: 700; font-size: 1rem; color: #0a0a0a;\">{{ stateName }}<\/div><\/div>\n      <div><div style=\"font-family: 'Geist Mono', monospace; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: #3a3326; margin-bottom: 0.5rem;\">State cohort<\/div><div style=\"font-family: 'Geist', sans-serif; font-weight: 700; font-size: 1rem; color: #0a0a0a;\">{{ stateNLabel }}<\/div><\/div>\n      <div><div style=\"font-family: 'Geist Mono', monospace; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: #3a3326; margin-bottom: 0.5rem;\">Indicators<\/div><div style=\"font-family: 'Geist', sans-serif; font-weight: 700; font-size: 1rem; color: #0a0a0a;\">8 measured<\/div><\/div>\n      <div><div style=\"font-family: 'Geist Mono', monospace; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: #3a3326; margin-bottom: 0.5rem;\">Sources<\/div><div style=\"font-family: 'Geist', sans-serif; font-weight: 700; font-size: 1rem; color: #0a0a0a;\">Public only<\/div><\/div>\n    <\/div>\n  <\/section>\n\n  <!-- 00 METHODOLOGY -->\n  <section class=\"pad\" style=\"padding: 4rem 3rem; border-bottom: 1px solid #c9bfa6;\">\n    <div style=\"font-family: 'Geist Mono', monospace; font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: #3a3326; margin-bottom: 1rem;\"><b style=\"color: #d62524; font-weight: 700;\">00<\/b> \u00b7 How this comparison works<\/div>\n    <h2 class=\"h2\" style=\"font-family: 'Geist', sans-serif; font-weight: 800; font-size: 2.5rem; line-height: 1.05; letter-spacing: -0.03em; text-wrap: balance; margin-bottom: 1.5rem;\">One operator, measured against <em style=\"font-style: italic; color: #d62524;\">its own state jurisdiction<\/em>.<\/h2>\n    <p style=\"font-size: 1rem; line-height: 1.6; max-width: 740px; opacity: 0.88; margin-bottom: 1.5rem;\">We place a telco's external cyber risk posture next to the real average of every analyzed operator in its state jurisdiction, using the same public, non-intrusive data on both sides. The composite score is a max-dominant blend of five weighted pillars (threat &amp; exploit exposure, external attack surface, infrastructure risk, web application risk and email security), so a single severely compromised pillar cannot be masked by strength elsewhere. Your headline score is the highest composite across all of your distinct hosts. Alongside it, six individual exposures (Critical-band membership, CISA KEV, elevated EPSS, dangling DNS, weak DMARC and weak SPF) are each compared to the share of state peers carrying the same type of cyber risk.<\/p>\n  <\/section>\n\n  <!-- 01 HEADLINE VERDICT -->\n  <section class=\"pad\" style=\"padding: 4rem 3rem; border-bottom: 1px solid #c9bfa6;\">\n    <div style=\"font-family: 'Geist Mono', monospace; font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: #3a3326; margin-bottom: 1rem;\"><b style=\"color: #d62524; font-weight: 700;\">01<\/b> \u00b7 The headline verdict<\/div>\n    <h2 class=\"h2\" style=\"font-family: 'Geist', sans-serif; font-weight: 800; font-size: 2.5rem; line-height: 1.05; letter-spacing: -0.03em; text-wrap: balance; margin-bottom: 1.5rem;\">Where you sit, <em style=\"font-style: italic; color: {{ verdictColor }};\">at a glance<\/em>.<\/h2>\n\n    <!-- verdict banner -->\n    <div class=\"verdictgrid avoidbreak\" style=\"display: grid; grid-template-columns: 1.1fr 2fr; gap: 2rem; align-items: center; background: #e8e1d1; padding: 2rem; border: 1px solid #c9bfa6; border-left: 4px solid {{ verdictColor }}; margin-bottom: 1.75rem;\">\n      <div>\n        <div style=\"font-family: 'Geist Mono', monospace; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: #3a3326; margin-bottom: 0.5rem;\">Composite score \u00b7 band<\/div>\n        <div style=\"font-family: 'Geist', sans-serif; font-weight: 800; font-size: 4.75rem; line-height: 0.9; letter-spacing: -0.04em; color: {{ scoreColor }};\">{{ scoreLabel }}<\/div>\n        <div style=\"display: inline-block; margin-top: 0.6rem; padding: 0.25rem 0.6rem; font-family: 'Geist Mono', monospace; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; font-weight: 700; color: #fff; background: {{ scoreColor }};\">{{ scoreBand }} band<\/div>\n      <\/div>\n      <div>\n        <div style=\"font-family: 'Geist', sans-serif; font-weight: 700; font-size: 1.375rem; line-height: 1.3; letter-spacing: -0.01em;\">{{ verdictHeadline }}<\/div>\n        <p style=\"font-size: 0.9375rem; line-height: 1.6; margin-top: 0.75rem; opacity: 0.9; max-width: none;\">{{ verdictBody }}<\/p>\n      <\/div>\n    <\/div>\n\n    <!-- composite gauge: operator vs state vs national -->\n    <div class=\"avoidbreak\" style=\"background: #e8e1d1; padding: 2rem; border: 1px solid #c9bfa6;\">\n      <div style=\"display: flex; justify-content: space-between; align-items: baseline; padding-bottom: 0.75rem; border-bottom: 1px solid #c9bfa6; margin-bottom: 1.5rem;\">\n        <div style=\"font-family: 'Geist', sans-serif; font-weight: 700; font-size: 1.0625rem; letter-spacing: -0.01em;\">Composite score \u00b7 operator vs state cohort<\/div>\n        <div style=\"font-family: 'Geist Mono', monospace; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: #3a3326;\">Scale 0\u2013100<\/div>\n      <\/div>\n\n      <div style=\"padding: 2.25rem 0 0.5rem;\">\n        <div style=\"height: 34px; background: rgba(10,10,10,0.06); position: relative;\">\n          <!-- operator fill -->\n          <div style=\"height: 100%; width: {{ scoreWidth }}; background: {{ scoreColor }};\"><\/div>\n          <!-- operator value label sitting on the fill edge -->\n          <div style=\"position: absolute; top: -1.9rem; left: {{ scoreWidth }}; transform: translateX(-50%); font-family: 'Geist Mono', monospace; font-weight: 700; font-size: 0.8125rem; color: {{ scoreColor }}; white-space: nowrap;\">You {{ scoreLabel }}<\/div>\n          <!-- state mean marker -->\n          <div style=\"position: absolute; top: -6px; bottom: -6px; width: 2px; background: #3a3326; left: {{ stateMeanWidth }};\"><\/div>\n          <div style=\"position: absolute; bottom: -1.65rem; left: {{ stateMeanWidth }}; transform: translateX(-50%); font-family: 'Geist Mono', monospace; font-weight: 700; font-size: 0.75rem; color: #3a3326; white-space: nowrap;\">{{ stateName }} {{ stateMeanLabel }}<\/div>\n          <!-- national mean marker -->\n          <div style=\"position: absolute; top: -6px; bottom: -6px; width: 2px; background: #0030d9; left: {{ natMeanWidth }};\"><\/div>\n          <div style=\"position: absolute; top: -1.65rem; left: {{ natMeanWidth }}; transform: translateX(-50%); font-family: 'Geist Mono', monospace; font-weight: 700; font-size: 0.75rem; color: #0030d9; white-space: nowrap;\">Nat'l {{ natMeanLabel }}<\/div>\n        <\/div>\n        <div style=\"display: flex; justify-content: space-between; margin-top: 2rem; font-family: 'Geist Mono', monospace; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: #3a3326;\">\n          <span>0<\/span><span>50<\/span><span>100<\/span>\n        <\/div>\n      <\/div>\n      <div style=\"font-family: 'Geist Mono', monospace; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: #3a3326; padding-top: 1rem; margin-top: 1.25rem; border-top: 1px solid #c9bfa6;\">{{ gaugeNote }}<\/div>\n    <\/div>\n  <\/section>\n\n  <!-- 02 INDICATOR BY INDICATOR -->\n  <section class=\"pad\" style=\"padding: 4rem 3rem; border-bottom: 1px solid #c9bfa6;\">\n    <div style=\"font-family: 'Geist Mono', monospace; font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: #3a3326; margin-bottom: 1rem;\"><b style=\"color: #d62524; font-weight: 700;\">02<\/b> \u00b7 Indicator by indicator<\/div>\n    <h2 class=\"h2\" style=\"font-family: 'Geist', sans-serif; font-weight: 800; font-size: 2.5rem; line-height: 1.05; letter-spacing: -0.03em; text-wrap: balance; margin-bottom: 1.5rem;\">Your status against the <em style=\"font-style: italic; color: #d62524;\">state cohort<\/em>.<\/h2>\n    <p style=\"font-size: 1rem; line-height: 1.6; max-width: 740px; opacity: 0.88; margin-bottom: 1.75rem;\">Each panel shows your status on one indicator, next to the share of {{ stateName }} operators that carry the same exposure. The bar is the state cohort rate; the chip is where your operator lands. Red means your posture is worse than, or in line with, an already-elevated cohort; green means you are clear where many peers are not.<\/p>\n\n    <div style=\"display: flex; flex-direction: column; gap: 1px; background: rgba(10,18,32,0.12); border: 1px solid rgba(10,18,32,0.12);\">\n      <sc-for list=\"{{ indicators }}\" as=\"ind\" hint-placeholder-count=\"6\">\n        <div class=\"indrow avoidbreak\" style=\"background: #f1ece0; padding: 1.4rem 1.5rem; display: grid; grid-template-columns: 1.4fr 150px 1.3fr; gap: 1.5rem; align-items: center;\">\n          <div>\n            <div style=\"font-family: 'Geist', sans-serif; font-weight: 700; font-size: 1.0625rem; letter-spacing: -0.01em; margin-bottom: 0.15rem;\">{{ ind.name }}<\/div>\n            <div style=\"font-size: 0.8125rem; line-height: 1.45; color: #3a3326;\">{{ ind.sub }}<\/div>\n          <\/div>\n          <div style=\"display: flex; flex-direction: column; gap: 0.3rem;\ var domains = Object.keys(CARRIER_DATA);
var activeSugIdx = -1;

document.getElementById('searchBox').addEventListener('input', function(){
  var q = this.value.trim().toLowerCase();
  if(q.length < 2){ hideSug(); return; }
  var matches = domains.filter(function(d){
    var c = CARRIER_DATA[d];
    return c.n.toLowerCase().indexOf(q) >= 0 || d.toLowerCase().indexOf(q) >= 0;
  }).slice(0,10);
  renderSug(matches);
});

document.getElementById('searchBox').addEventListener('keydown', function(e){
  var items = document.querySelectorAll('.sug-item');
  if(e.key==='ArrowDown'){ activeSugIdx=Math.min(activeSugIdx+1,items.length-1); highlightSug(items); e.preventDefault(); }
  else if(e.key==='ArrowUp'){ activeSugIdx=Math.max(activeSugIdx-1,0); highlightSug(items); e.preventDefault(); }
  else if(e.key==='Enter' && activeSugIdx>=0){ items[activeSugIdx].click(); }
  else if(e.key==='Escape'){ hideSug(); }
});

document.addEventListener('click', function(e){
  if(!e.target.closest('.search-wrap')) hideSug();
});

function renderSug(matches){
  var el = document.getElementById('suggestions');
  if(!matches.length){
    el.innerHTML='<div class="no-results">No carriers found</div>';
    el.style.display='block'; return;
  }
  var h = '';
  for(var i=0;i<matches.length;i++){
    var d = matches[i];
    var c = CARRIER_DATA[d];
    var sn = STATE_NAMES[c.s] || c.s;
    h += '<div class="sug-item" onclick="loadReport(\''+escHtml(d)+'\')">'
       + '<span class="sug-name">'+escHtml(c.n)+'</span>'
       + '<span class="sug-meta">'+escHtml(d)+' &nbsp;&middot;&nbsp; '+escHtml(sn)+' &nbsp;&middot;&nbsp; Score: '+c.sc+'</span>'
       + '</div>';
  }
  el.innerHTML = h;
  el.style.display='block';
  activeSugIdx=-1;
}

function escHtml(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlightSug(items){
  for(var i=0;i<items.length;i++) items[i].classList.toggle('active', i===activeSugIdx);
}

function hideSug(){
  document.getElementById('suggestions').style.display='none';
  activeSugIdx=-1;
}

function computeStateReportData(domain, c, st, nat){
  var score = c.sc;
  var stateName = STATE_NAMES[c.s] || c.s;
  var stateCode = c.s;

  function bandColor(s){ return s>=75?'#d62524':s>=50?'#e07a17':s>=25?'#c9a227':'#2d7a4a'; }
  function rateColor(r){ return r>=60?'#d62524':r>=45?'#e07a17':r>=30?'#c9a227':'#2d7a4a'; }

  var scoreColor=bandColor(score);
  var scoreBand=score>=75?'Critical Risk':score>=50?'High Risk':score>=25?'Moderate Risk':'Low Risk';
  var scoreLabel=score.toFixed(1);
  var scoreWidth=Math.max(2,Math.min(100,score)).toFixed(1)+'%';

  var stateMean=st.mean,stateMin=st.min,stateMax=st.max,natMean=nat.mean;
  var stateMeanLabel=stateMean.toFixed(1),stateMeanWidth=Math.max(2,Math.min(100,stateMean)).toFixed(1)+'%';
  var stateMinLabel=stateMin.toFixed(1),stateMinWidth=Math.max(2,Math.min(100,stateMin)).toFixed(1)+'%';
  var stateMaxLabel=stateMax.toFixed(1),stateMaxWidth=Math.max(2,Math.min(100,stateMax)).toFixed(1)+'%';
  var natMeanLabel=natMean.toFixed(1),natMeanWidth=Math.max(2,Math.min(100,natMean)).toFixed(1)+'%';

  var delta=score-stateMean, absDelta=Math.abs(delta);
  var dir=delta>0?'above':'below';
  var verdictColor=scoreColor;
  var verdictHeadline,verdictBody;
  if(score>=75){
    verdictHeadline=c.n+' presents significant cyber risk within '+stateName;
    verdictBody='With a risk score of '+score.toFixed(1)+' — '+absDelta.toFixed(1)+' points '+dir+' the '+stateName+' state average of '+stateMean.toFixed(1)+' — this operator\'s exposure is among the most elevated in the state peer group. Immediate remediation focus is warranted.';
  } else if(score>=50){
    verdictHeadline=c.n+' carries elevated risk relative to '+stateName+' peers';
    verdictBody='A risk score of '+score.toFixed(1)+' places this carrier '+absDelta.toFixed(1)+' points '+dir+' the '+stateName+' average of '+stateMean.toFixed(1)+'. Multiple attack surface indicators require attention before this exposure can be considered managed.';
  } else if(score>=25){
    verdictHeadline=c.n+' shows moderate risk near the '+stateName+' peer average';
    verdictBody='At '+score.toFixed(1)+', this operator sits '+absDelta.toFixed(1)+' points '+dir+' the '+stateName+' state mean of '+stateMean.toFixed(1)+'. Targeted remediation can move this carrier into the lower-risk tier.';
  } else {
    verdictHeadline=c.n+' is among the lower-risk operators in '+stateName;
    verdictBody='With a score of '+score.toFixed(1)+' — '+absDelta.toFixed(1)+' points '+dir+' the state average of '+stateMean.toFixed(1)+' — this carrier compares favorably to '+stateName+' peers. Continued hygiene maintenance is recommended.';
  }

  function mk(name,sub,present,rate,natRate){
    return {name:name,sub:sub,
      statusLabel:present?'PRESENT':'CLEAR',statusColor:present?'#d62524':'#2d7a4a',
      stateRateLabel:rate.toFixed(1)+'%',stateWidth:Math.max(2,Math.min(100,rate)).toFixed(1)+'%',
      barColor:rateColor(rate),natWidth:Math.max(2,Math.min(100,natRate)).toFixed(1)+'%',natLabel:natRate.toFixed(1)+'%'};
  }

  var indicators=[
    mk('Critical Band (≥75)','Score ≥ 75 risk threshold',score>=75,st.critical,nat.critical),
    mk('CISA KEV Exposure','Known Exploited Vulnerabilities',c.kev===1,st.kev,nat.kev),
    mk('EPSS Exposure','Exploit Prediction Scoring System',c.epss===1,st.epss,nat.epss),
    mk('Dangling DNS','Unclaimed subdomain records',c.dan===1,st.dangling,nat.dangling),
    mk('Weak DMARC','Missing or permissive DMARC policy',c.dmarc<3,st.dmarc,nat.dmarc),
    mk('Weak SPF','Missing or permissive SPF record',c.spf<2,st.spf,nat.spf),
  ];

  var presentCount=indicators.filter(function(i){return i.statusColor==='#d62524';}).length;
  var indicatorSummary=presentCount===0
    ?'All six indicators are clear — no active signal exposure detected across KEV, EPSS, DNS, or email authentication.'
    :presentCount<=2?presentCount+' of 6 attack surface indicators are active. Focused remediation on flagged signals is recommended.'
    :presentCount<=4?presentCount+' of 6 attack surface indicators are active, placing this operator above the typical remediation threshold.'
    :'Five or more attack surface indicators are active, representing broad exposure across KEV, DNS, and email authentication surfaces.';

  var stateCarriers=Object.keys(CARRIER_DATA).filter(function(k){return CARRIER_DATA[k].s===c.s;});
  var below=stateCarriers.filter(function(k){return CARRIER_DATA[k].sc<score;}).length;
  var percentile=Math.round(below/stateCarriers.length*100);
  var percentileLabel=percentile>=50?'Higher risk than '+percentile+'% of '+stateName+' carriers':'Lower risk than '+(100-percentile)+'% of '+stateName+' carriers';

  var stateN=st.n;
  var rank=stateCarriers.filter(function(k){return CARRIER_DATA[k].sc>score;}).length+1;
  var rankHeadline='#'+rank+' of '+stateN+' operators in '+stateName+' by risk score';
  var rankBody=score>=50
    ?c.n+' ranks '+rank+' of '+stateN+' in '+stateName+'. Resolving top flagged indicators would improve peer standing.'
    :'Ranked '+rank+' of '+stateN+' in '+stateName+', this operator compares favorably to the majority of state peers.';

  var deltaBig=(delta>=0?'+':'')+delta.toFixed(1);
  var deltaStatement=delta>=0
    ?c.n+' scores '+absDelta.toFixed(1)+' points above the '+stateName+' state average of '+stateMean.toFixed(1)+'.'
    :c.n+' scores '+absDelta.toFixed(1)+' points below the '+stateName+' state average of '+stateMean.toFixed(1)+'.';

  var takeaways=[];
  if(c.kev===1){
    takeaways.push({title:'Active KEV Exposure Requires Immediate Patching',body:'Known exploited vulnerabilities are present in '+c.n+'\'s attack surface. CISA KEV entries carry regulatory and compliance weight — boards should treat this as a priority remediation item.'});
  } else {
    takeaways.push({title:'No Known Exploited Vulnerabilities Detected',body:c.n+' has no CISA KEV entries in its current attack surface. KEV presence is the leading predictor of active exploitation in telco environments.'});
  }
  if(c.dmarc<3||c.spf<2){
    takeaways.push({title:'Email Authentication Gaps Create Spoofing Risk',body:'Weak or missing DMARC/SPF configurations leave '+c.n+' open to spoofing. In '+stateName+', '+st.dmarc.toFixed(0)+'% of carriers share this gap.'});
  } else {
    takeaways.push({title:'Email Authentication Controls Are in Place',body:'Both DMARC and SPF records are properly configured, placing '+c.n+' ahead of '+st.dmarc.toFixed(0)+'% of '+stateName+' peers on email security.'});
  }
  if(score>=50){
    takeaways.push({title:'State Benchmark: Remediation Can Shift Standing',body:c.n+'\'s score of '+score.toFixed(1)+' sits '+absDelta.toFixed(1)+' points '+dir+' the '+stateName+' average. Resolving 2–3 flagged indicators could reduce exposure by an estimated 15–25 points.'});
  } else {
    takeaways.push({title:'Peer Benchmark: Maintain Current Hygiene Posture',body:c.n+' is performing well relative to '+stateName+' peers at '+score.toFixed(1)+'. Continued monitoring will protect this standing as the state\'s risk profile evolves.'});
  }

  return {
    operatorName:c.n, stateName:stateName, stateCode:stateCode,
    scoreLabel:scoreLabel, scoreBand:scoreBand, scoreColor:scoreColor, scoreWidth:scoreWidth,
    stateMeanLabel:stateMeanLabel, stateMeanWidth:stateMeanWidth,
    stateMinLabel:stateMinLabel, stateMinWidth:stateMinWidth,
    stateMaxLabel:stateMaxLabel, stateMaxWidth:stateMaxWidth,
    natMeanLabel:natMeanLabel, natMeanWidth:natMeanWidth,
    verdictColor:verdictColor, verdictHeadline:verdictHeadline, verdictBody:verdictBody,
    indicators:indicators, indicatorSummary:indicatorSummary,
    percentileLabel:percentileLabel, rankHeadline:rankHeadline, rankBody:rankBody,
    deltaBig:deltaBig, deltaStatement:deltaStatement,
    stateNLabel:stateN+' carriers', statePeerCount:stateN+' operators in '+stateName,
    stateRangeNote:'Scores range from '+stateMin.toFixed(1)+' to '+stateMax.toFixed(1)+' across '+stateName+' carriers.',
    gaugeNote:'Position reflects risk score relative to state range. National mean shown for cross-market context.',
    takeaways:takeaways, ctaOpen:false, ctaDismiss:'', ctaSubject:'SureShield Report: '+c.n, 'true':true,
  };
}

function processTemplate(tmpl,vars){
  tmpl=processSCFor(tmpl,vars);
  tmpl=processSCIf(tmpl,vars);
  tmpl=fillVars(tmpl,vars);
  return tmpl;
}

function processSCFor(tmpl,vars){
  var re=/<sc-for\s+list="\{\{\s*([^}]+?)\s*\}\}"\s+as="([^"]+)"[^>]*>([\s\S]*?)<\/sc-for>/g;
  return tmpl.replace(re,function(m,listKey,alias,body){
    listKey=listKey.trim();
    var list=resolveVar(vars,listKey);
    if(!Array.isArray(list)) return '';
    return list.map(function(item){
      var iv=Object.assign({},vars); iv[alias]=item;
      var r=processSCIf(body,iv); r=fillVars(r,iv); return r;
    }).join('');
  });
}

function processSCIf(tmpl,vars){
  var result=tmpl;
  for(var i=0;i<20;i++){
    var re=/<sc-if\s+value="\{\{\s*([^}]+?)\s*\}\}"[^>]*>((?:(?!<sc-if)[\s\S])*?)<\/sc-if>/g;
    var next=result.replace(re,function(m,key,body){
      return resolveVar(vars,key.trim())?body:'';
    });
    if(next===result) break;
    result=next;
  }
  return result;
}

function fillVars(str,vars){
  return str.replace(/\{\{\s*([^}]+?)\s*\}\}/g,function(m,key){
    var v=resolveVar(vars,key.trim());
    return (v===null||v===undefined)?'':String(v);
  });
}

function resolveVar(vars,key){
  var parts=key.split('.');
  var v=vars;
  for(var i=0;i<parts.length;i++){
    if(v===null||v===undefined) return '';
    v=v[parts[i]];
  }
  return (v===null||v===undefined)?'':v;
}

function buildCtaBar(companyName){
  var cn = (companyName||'this carrier').replace(/'/g,"\'");
  var div = document.createElement('div');
  div.innerHTML = '<div style="background:#0a0a0a;padding:1rem 3rem;display:flex;align-items:center;justify-content:space-between;gap:2rem;flex-wrap:wrap;color:#f1ece0;">'
    +'<div style="font-size:0.875rem;line-height:1.4;">'
    +'<strong style="color:#d62524;font-family:\'Geist Mono\',monospace;font-size:10px;letter-spacing:0.14em;text-transform:uppercase;font-weight:700;">NEXT STEP</strong>'
    +' — Want these findings walked through for '+(companyName||'this carrier')+'? Book a deep-dive review with the SureShield team.'
    +'</div>'
    +'<button onclick="openReviewModal(\''+cn+'\')" style="flex:0 0 auto;background:#d62524;color:#f1ece0;padding:0.6rem 1.25rem;font-family:\'Geist Mono\',monospace;font-size:10px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;white-space:nowrap;border:none;cursor:pointer;">REQUEST A REVIEW MEETING →</button>'
    +'</div>';
  return div.outerHTML;
}

// ── Review Request Modal ────────────────────────────────────────────────────
var GAS_ENDPOINT = 'https://script.google.com/macros/s/AKfycbxB5AUZC5baErtUaq-04pWKduVRgutukUTVhYFluJSu9sYcHPXo8neHgyHmHGCcZvyr/exec';

function injectReviewModal() {
  if (document.getElementById('reviewModal')) return;
  var style = document.createElement('style');
  style.textContent = [
    '#reviewModal{display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.55);align-items:center;justify-content:center}',
    '#reviewModal.open{display:flex}',
    '.rm-card{background:#f1ece0;border-radius:12px;padding:2.5rem 2rem 2rem;width:100%;max-width:460px;box-shadow:0 8px 40px rgba(0,0,0,0.25);font-family:\'Geist\',sans-serif}',
    '.rm-card h2{font-size:1.3rem;font-weight:700;color:#0a1220;margin-bottom:0.35rem}',
    '.rm-card p{font-size:0.88rem;color:#5a5248;margin-bottom:1.5rem}',
    '.rm-field{margin-bottom:1rem}',
    '.rm-field label{display:block;font-size:0.8rem;font-weight:600;color:#3a3326;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.05em}',
    '.rm-field input,.rm-field textarea{width:100%;padding:0.7rem 0.85rem;border:1.5px solid rgba(10,18,32,0.2);border-radius:6px;font-family:\'Geist\',sans-serif;font-size:0.93rem;background:#fff;outline:none}',
    '.rm-field input:focus,.rm-field textarea:focus{border-color:#c9a227}',
    '.rm-field textarea{resize:vertical;min-height:80px}',
    '.rm-actions{display:flex;gap:0.75rem;margin-top:1.5rem}',
    '.rm-submit{flex:1;padding:0.75rem;background:#0a1220;color:#fff;border:none;border-radius:6px;font-family:\'Geist\',sans-serif;font-size:0.93rem;font-weight:600;cursor:pointer;transition:background 0.15s}',
    '.rm-submit:hover{background:#1a2a40}',
    '.rm-submit:disabled{background:#888;cursor:not-allowed}',
    '.rm-cancel{padding:0.75rem 1.2rem;background:none;border:1.5px solid rgba(10,18,32,0.2);border-radius:6px;font-family:\'Geist\',sans-serif;font-size:0.93rem;cursor:pointer;color:#5a5248}',
    '.rm-cancel:hover{border-color:#0a1220}',
    '.rm-success{text-align:center;padding:1rem 0}',
    '.rm-success h3{font-size:1.1rem;font-weight:700;color:#2d7a4a;margin-bottom:0.5rem}',
    '.rm-success p{font-size:0.88rem;color:#5a5248}'
  ].join('\n');
  document.head.appendChild(style);

  var modal = document.createElement('div');
  modal.id = 'reviewModal';
  modal.innerHTML = [
    '<div class="rm-card">',
    '  <div id="rmForm">',
    '    <h2>Request a Review Meeting</h2>',
    '    <p>Book a deep-dive walkthrough of these findings with the SureShield team.</p>',
    '    <div class="rm-field"><label>Company</label><input id="rmCompany" type="text" placeholder="Your company name"></div>',
    '    <div class="rm-field"><label>Work Email *</label><input id="rmEmail" type="email" placeholder="you@company.com"></div>',
    '    <div class="rm-field"><label>Message (optional)</label><textarea id="rmMessage" placeholder="Any context or questions…"></textarea></div>',
    '    <div class="rm-actions">',
    '      <button class="rm-cancel" onclick="closeReviewModal()">Cancel</button>',
    '      <button class="rm-submit" id="rmSubmitBtn" onclick="submitReviewRequest()">Request Meeting →</button>',
    '    </div>',
    '    <div id="rmError" style="margin-top:0.75rem;color:#d62524;font-size:0.85rem;display:none"></div>',
    '  </div>',
    '  <div class="rm-success" id="rmSuccess" style="display:none">',
    '    <h3>Request sent!</h3>',
    '    <p>The SureShield team will reach out within one business day to schedule your review.</p>',
    '    <button class="rm-cancel" style="margin-top:1rem" onclick="closeReviewModal()">Close</button>',
    '  </div>',
    '</div>'
  ].join('');
  document.body.appendChild(modal);
  modal.addEventListener('click', function(e){ if(e.target===modal) closeReviewModal(); });
}

function openReviewModal(carrierName) {
  // If embedded in hub.html, delegate to hub's Book a Review Session modal
  try { if (window.parent !== window) { window.parent.postMessage({ type: 'open-review', company: carrierName || '' }, '*'); return; } } catch(e) {}
  injectReviewModal();
  var companyField = document.getElementById('rmCompany');
  if (companyField && carrierName) { companyField.value = carrierName; companyField.readOnly = true; }
  document.getElementById('rmForm').style.display = '';
  document.getElementById('rmSuccess').style.display = 'none';
  document.getElementById('rmError').style.display = 'none';
  var btn = document.getElementById('rmSubmitBtn');
  if(btn) { btn.disabled = false; btn.textContent = 'Request Meeting →'; }
  document.getElementById('reviewModal').classList.add('open');
}

function closeReviewModal() {
  var m = document.getElementById('reviewModal');
  if(m) m.classList.remove('open');
}

function submitReviewRequest() {
  var email = (document.getElementById('rmEmail').value || '').trim();
  var company = (document.getElementById('rmCompany').value || '').trim();
  var message = (document.getElementById('rmMessage').value || '').trim();
  var errEl = document.getElementById('rmError');
  if(!email || !/\S+@\S+\.\S+/.test(email)) {
    errEl.textContent = 'Please enter a valid work email address.';
    errEl.style.display = '';
    return;
  }
  errEl.style.display = 'none';
  var btn = document.getElementById('rmSubmitBtn');
  btn.disabled = true;
  btn.textContent = 'Sending…';

  var payload = {
    action: 'submitform',
    form_type: 'review_request',
    work_email: email,
    company_name: company,
    message: message,
    source: window.location.pathname.split('/').pop()
  };

  fetch(GAS_ENDPOINT, {
    method: 'POST',
    body: JSON.stringify(payload),
    headers: {'Content-Type':'application/json'}
  })
  .then(function(r){ return r.json(); })
  .then(function(data){
    if(data && data.ok) {
      document.getElementById('rmForm').style.display = 'none';
      document.getElementById('rmSuccess').style.display = '';
    } else {
      errEl.textContent = 'Something went wrong. Please try again.';
      errEl.style.display = '';
      btn.disabled = false;
      btn.textContent = 'Request Meeting →';
    }
  })
  .catch(function(){
    // On CORS/network error, still show success (GAS no-cors workaround)
    document.getElementById('rmForm').style.display = 'none';
    document.getElementById('rmSuccess').style.display = '';
  });
}
