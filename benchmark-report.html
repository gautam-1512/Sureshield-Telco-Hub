  <style>

    body { background: #0a0a0a; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
    #__bundler_loading { position: fixed; bottom: 20px; right: 20px; font: 13px/1.4 -apple-system, BlinkMacSystemFont, sans-serif; color: #666; background: #fff; padding: 8px 14px; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.12); z-index: 10000; }
    #__bundler_thumbnail { position: fixed; inset: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: #0a0a0a; z-index: 9999; }
    #__bundler_thumbnail svg { width: 100%; height: 100%; object-fit: contain; }
    #__bundler_placeholder { color: #999; font-size: 14px; }

    <div style="position:fixed;bottom:12px;left:12px;font:13px/1.4 -apple-system,BlinkMacSystemFont,sans-serif;color:#999;background:rgba(255,255,255,0.9);padding:6px 12px;border-radius:6px;box-shadow:0 1px 4px rgba(0,0,0,0.08);z-index:10000;">

<script id="hub-bootstrap">
(function(){
  var p = new URLSearchParams(location.search);
  window.__HUB_DOMAIN = p.get('domain') || '';

  var BANDS = [
    {label:'Minimal',min:0, color:'#2d7a4a',bg:'rgba(45,122,74,.12)'},
    {label:'Low',    min:10,color:'#4a9d6a',bg:'rgba(74,157,106,.12)'},
    {label:'Medium', min:25,color:'#c9a227',bg:'rgba(201,162,39,.12)'},
    {label:'High',   min:50,color:'#cf6a22',bg:'rgba(207,106,34,.12)'},
    {label:'Critical',min:75,color:'#d62524',bg:'rgba(214,37,36,.12)'},
  ];
  function bandFor(score){ var b=BANDS[0]; BANDS.forEach(function(x){ if(score>=x.min) b=x; }); return b; }

  function buildReportData(cd) {
    var score = cd.max_score != null ? Math.round(cd.max_score) : 50;
    var pillars = cd.max_pillars || [50,50,50,50,50];
    var avgPillars = cd.avg_pillars || pillars;
    var indAvg = cd.pillar_industry_avg || [55,48,52,50,54];
    var indic  = cd.indicators || {};
    var moves  = cd.action_plan || [];
    var sc     = cd.state_cohort || {};
    var nat    = cd.national || {};

    var PILLAR_DEFS = [
      {id:'p1',name:'P1 · Threat Exposure',   weight:30,desc:'KEV, EPSS, breach exposure'},
      {id:'p2',name:'P2 · Email Security',     weight:10,desc:'DMARC, SPF, DKIM posture'},
      {id:'p3',name:'P3 · Network Security',   weight:20,desc:'Open ports, TLS, routing'},
      {id:'p4',name:'P4 · Web / App',          weight:15,desc:'Web headers, cert validity'},
      {id:'p5',name:'P5 · Attack Surface',     weight:25,desc:'Exposed hosts, subdomains'},
    ];

    // Build indicator rows matching template's expected shape
    var indicRows = [
      {name:'CISA KEV present',        you:(cd.kev_count||0)>0?'PRESENT':'CLEAR', youTone:(cd.kev_count||0)>0?'critical':'good', guidance:'Immediately patch CISA Known Exploited Vulnerabilities. Apply vendor patches or isolate affected hosts.', count:(cd.kev_count||0)},
      {name:'Elevated EPSS CVEs',       you:(cd.epss_count||0)>0?'PRESENT':'CLEAR',youTone:(cd.epss_count||0)>0?'high':'good',  guidance:'Prioritize CVEs with EPSS >0.5 for patching within 30 days.', count:(cd.epss_count||0)},
      {name:'Weak DMARC (p=none)',      you:indic.dmarc_weak?'PRESENT':'CLEAR', youTone:indic.dmarc_weak?'high':'good',    guidance:'Upgrade DMARC from p=none to p=quarantine or p=reject on all sending domains.', count:indic.dmarc_count||0},
      {name:'SPF soft-fail (~all)',      you:indic.spf_weak?'PRESENT':'CLEAR',   youTone:indic.spf_weak?'warn':'good',     guidance:'Change SPF policy to -all (hard fail) to enforce strict sender validation.', count:indic.spf_count||0},
      {name:'Dangling DNS records',      you:indic.dangling?'PRESENT':'CLEAR',   youTone:indic.dangling?'high':'good',     guidance:'Remove DNS records pointing to unclaimed cloud resources to prevent subdomain takeover.', count:indic.dangling_count||0},
      {name:'SSH exposed',              you:indic.ssh?'PRESENT':'CLEAR',       youTone:indic.ssh?'high':'good',         guidance:'Restrict SSH to known IP ranges. Enforce key-based auth and disable root login.', count:indic.ssh_count||0},
      {name:'RDP exposed',              you:indic.rdp?'PRESENT':'CLEAR',       youTone:indic.rdp?'critical':'good',     guidance:'Place RDP behind VPN immediately. RDP is the leading ransomware entry point.', count:indic.rdp_count||0},
      {name:'Database ports open',      you:(indic.mysql||indic.postgres)?'PRESENT':'CLEAR', youTone:(indic.mysql||indic.postgres)?'critical':'good', guidance:'Restrict database ports to internal networks only.', count:0},
      {name:'Web app vulnerabilities',  you:(indic.xss||indic.ssrf||indic.sqli)?'PRESENT':'CLEAR', youTone:(indic.xss||indic.ssrf||indic.sqli)?'high':'good', guidance:'Conduct DAST scan. Patch XSS, SSRF, and SQL injection endpoints found.', count:0},
    ];

    // KEV table rows
    var kevRows = (cd.kev_cves||[]).map(function(cv){
      return {
        cve: cv.id, name: cv.name,
        severity: cv.severity, cvss: String(cv.cvss),
        epss: cv.epss || '0.88',
        flag: cv.flag,
        fix: cv.fix || 'Apply vendor security patch immediately.',
      };
    });

    // Top subdomains as peer-like table
    var topSubs = (cd.top_subdomains||[]).slice(0,5).map(function(s){
      var b = bandFor(s.score);
      return {name:s.host, score:s.score, band:s.band||b.label, color:b.color, tone:s.score>=75?'critical':s.score>=50?'high':s.score>=25?'warn':'good'};
    });

    // Action plan moves
    var planMoves = moves.slice(0,8).map(function(m,i){
      return Object.assign({},m,{
        num: String(i+1).padStart(2,'0'),
        numColor: m.tone==='critical'?'#d62524':m.tone==='high'?'#cf6a22':m.tone==='warn'?'#d59a2e':'#4a9d6a',
        pillarWindowLabel: (m.window||'30 Days')+' · '+(m.pillar||''),
      });
    });

    var fromBand = bandFor(score);
    var targetScore = cd.target_score != null ? cd.target_score : Math.max(0,score-15);
    var toBand = bandFor(targetScore);

    return {
      operator: {
        name:          cd.company_name,
        domain:        cd.domain,
        segment:       'Telecommunications',
        segmentShort:  'Telco',
        geographyStates: cd.state_name ? [cd.state_name] : [],
        commType:      cd.comm_type || '',
        employees:     cd.employee_bucket || '',
        founded:       cd.founded_year ? String(cd.founded_year) : '',
        revenue:       cd.annual_revenue || '',
      },
      score: {
        composite:    score,
        avg:          cd.avg_score != null ? Math.round(cd.avg_score) : score,
        bandOverride: null,
      },
      percentile: {
        industryPct: cd.nat_pctile || Math.round((score/100)*100),
        statePct:    cd.state_pctile || 50,
        peerPct:     cd.peer_rank && cd.peer_n ? Math.round((cd.peer_rank/cd.peer_n)*100) : 50,
      },
      bands: BANDS,
      pillars: PILLAR_DEFS.map(function(pl,i){
        return Object.assign({},pl,{
          score:      pillars[i]||score,
          avg:        avgPillars[i]||score,
          weight:     pl.weight,
          weightLabel:pl.weight+'% WEIGHT',
        });
      }),
      benchmarks: {
        industryN:       nat.n || 3106,
        industryMean:    nat.mean || 67.0,
        pillarIndustryAvg: {p1:indAvg[0]||55,p2:indAvg[1]||48,p3:indAvg[2]||52,p4:indAvg[3]||50,p5:indAvg[4]||54},
        stateN:          sc.n || 50,
        stateMean:       sc.mean || 65.0,
        peerN:           cd.peer_n || 0,
        peerMean:        cd.peer_avg || nat.mean || 67.0,
      },
      indicators: indicRows,
      peerTable: topSubs,
      findings: {
        kev:         kevRows,
        danglingDns: (cd.indicators&&cd.indicators.dangling) ? [{
          record: cd.domain, type:'CNAME', target:'Unclaimed resource',
          status:'VULNERABLE', tone:'critical',
        }] : [],
        email: {
          rows: [
            {label:'DMARC Policy', you:indic.dmarc_weak?'p=none (weak)':'p=reject (strong)', tone:indic.dmarc_weak?'high':'good', color:indic.dmarc_weak?'#cf6a22':'#4a9d6a'},
            {label:'SPF Policy',   you:indic.spf_weak?'~all (soft-fail)':'-all (hard-fail)',  tone:indic.spf_weak?'warn':'good',  color:indic.spf_weak?'#d59a2e':'#4a9d6a'},
            {label:'DKIM',         you:'Not assessed', tone:'neutral', color:'#3a3326'},
          ],
        },
        services: {
          rows: [
            {label:'SSH',       you:indic.ssh?'EXPOSED ('+indic.ssh_count+' hosts)':'Not detected',   tone:indic.ssh?'high':'good',         color:indic.ssh?'#cf6a22':'#4a9d6a'},
            {label:'RDP',       you:indic.rdp?'EXPOSED ('+indic.rdp_count+' hosts)':'Not detected',   tone:indic.rdp?'critical':'good',      color:indic.rdp?'#d62524':'#4a9d6a'},
            {label:'MySQL',     you:indic.mysql?'EXPOSED':'Not detected', tone:indic.mysql?'critical':'good',    color:indic.mysql?'#d62524':'#4a9d6a'},
            {label:'PostgreSQL', you:indic.postgres?'EXPOSED':'Not detected', tone:indic.postgres?'critical':'good', color:indic.postgres?'#d62524':'#4a9d6a'},
            {label:'FTP',       you:indic.ftp?'EXPOSED':'Not detected',   tone:indic.ftp?'high':'good',          color:indic.ftp?'#cf6a22':'#4a9d6a'},
            {label:'SNMP',      you:indic.snmp?'EXPOSED':'Not detected',  tone:indic.snmp?'warn':'good',         color:indic.snmp?'#d59a2e':'#4a9d6a'},
          ],
        },
      },
      regulatory: {
        stats: [
          {label:'CISA KEV Count',     value:String(cd.kev_count||0),       tone:(cd.kev_count||0)>0?'critical':'good'},
          {label:'Total CVEs',         value:String(cd.total_cves||0),      tone:(cd.total_cves||0)>10?'high':'warn'},
          {label:'National Rank',      value:'#'+cd.nat_rank+' of '+cd.nat_n,tone:(cd.nat_pctile||0)>66?'critical':(cd.nat_pctile||0)>33?'high':'good'},
          {label:'State Rank',         value:'#'+cd.state_rank+' of '+cd.state_n, tone:(cd.state_pctile||0)>66?'critical':'good'},
          {label:'Breach Cost Est.',   value:cd.est_breach_cost,            tone:'critical'},
        ],
      },
      actionPlan: {
        moves:     planMoves,
        fromScore: score,
        toScore:   targetScore,
        fromBand:  fromBand.label,
        toBand:    toBand.label,
      },
      cost: {
        headlineHigh: cd.est_breach_cost || '$2.4M',
        raw:          cd.breach_cost_raw  || 2400000,
      },
      toggles: { showActionPlan:true, showSolutions:true },
    };
  }

  window.addEventListener('message', function(e){
    if(!e.data) return;
    var d = e.data;
    if(d.type === 'ss-hub-full-data' && d.data) {
      window.REPORT_DATA = buildReportData(d.data);
      window.dispatchEvent(new Event('reportdata'));
      return;
    }
    // Legacy simple blob
    if(d.type === 'ss-hub-carrier' && !window.REPORT_DATA) {
      var stub = buildReportData(d);
      window.REPORT_DATA = stub;
      window.dispatchEvent(new Event('reportdata'));
    }
  });

  // Notify hub/parent that this iframe is ready
  window.addEventListener('load', function(){
    if(window.parent !== window) {
      window.parent.postMessage({type:'ss-bench-ready', domain:window.__HUB_DOMAIN}, '*');
    }
  });
})();
</script>

  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

\u002Fscript>\n<\u002Fhelmet>\n<div style=\"max-width: 880px; margin: 0 auto; background: #f1ece0;\">\n\n  <!-- ===== MASTHEAD ===== -->\n  <header style=\"padding: 1.5rem 3rem; display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; border-bottom: 1px solid rgba(10,18,32,0.12); background: #f1ece0;\">\n    <div style=\"justify-self: start;\">\n      <img src=\"bcb9451c-e7b0-4cf4-88a9-727f0c12ceb5\" alt=\"SureShield\" style=\"height: 44px; width: auto;\">\n    <\u002Fdiv>\n    <div style=\"font-family: 'Geist Mono', monospace; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: #3a3326; text-align: center; line-height: 1.6; white-space: pre-line;\">{{ confidentiality }}<\u002Fdiv>\n    <div style=\"justify-self: end;\">\n      <img src=\"597160ff-cdc2-4be0-9a1c-bbc0963f5030\" alt=\"BorderHawk Cybersecurity\" style=\"height: 40px; width: auto;\">\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- ===== COVER ===== -->\n  <section style=\"padding: 6rem 3rem 4.5rem; border-bottom: 1px solid #c9bfa6; position: relative;\">\n    <div style=\"font-family: 'Geist Mono', monospace; font-size: 12px; letter-spacing: 0.2em; text-transform: uppercase; color: #d62524; font-weight: 700; margin-bottom: 2.5rem; display: flex; align-items: center; gap: 0.75rem;\"><span style=\"width: 3rem; height: 2px; background: #d62524; display: inline-block;\"><\u002Fspan>{{ shortName }} vs National Findings<\u002Fdiv>\n    <div style=\"font-family: 'Geist Mono', monospace; font-size: 13px; letter-spacing: 0.16em; text-transform: uppercase; color: #3a3326; font-weight: 600; margin-bottom: 1rem;\">Prepared for<\u002Fdiv>\n    <h1 style=\"font-family: 'Geist', sans-serif; font-weight: 800; font-size: 3.3rem; line-height: 0.96; letter-spacing: -0.04em; color: #0a0a0a; text-wrap: balance; margin-bottom: 1.5rem;\">{{ legalName }}<br><em style=\"font-style: italic; font-weight: 800; color: #d62524; letter-spacing: -0.025em;\">Your cyber risk<\u002Fem>, measured agains  you.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: #2a2620; border: 1px solid #2a2620; margin-top: 1.5rem;\">\n      <div style=\"background: #141210; padding: 1.4rem 1.5rem;\"><div style=\"font-family: 'Geist Mono', monospace; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: #a89b7c; margin-bottom: 0.5rem;\">Your worst security pillar<\u002Fdiv><div style=\"font-family: 'Geist', sans-serif; font-weight: 800; font-size: 1.5rem; letter-spacing: -0.02em; color: #d62524; line-height: 1.1;\">{{ worstPillarName }}<\u002Fdiv><div style=\"font-size: 0.8125rem; color: #ddd3bd; margin-top: 0.35rem;\">{{ worstPillarDetail }}<\u002Fdiv><\u002Fdiv>\n      <div style=\"background: #141210; padding: 1.4rem 1.5rem;\"><div style=\"font-family: 'Geist Mono', monospace; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: #a89b7c; margin-bottom: 0.5rem;\">Actively exploited CVEs<\u002Fdiv><div style=\"font-family: 'Geist', sans-serif; font-weight: 800; font-size: 1.5rem; letter-spacing: -0.02em; color: #d62524; line-height: 1.1;\">{{ activelyExploitedValue }}<\u002Fdiv><div style=\"font-size: 0.8125rem; color: #ddd3bd; margin-top: 0.35rem;\">{{ activelyExploitedDetail }}<\u002Fdiv><\u002Fdiv>\n      <div style=\"background: #141210; padding: 1.4rem 1.5rem;\"><div style=\"font-family: 'Geist Mono', monospace; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: #a89b7c; margin-bottom: 0.5rem;\">One bright spot<\u002Fdiv><div style=\"font-family: 'Geist', sans-serif; font-weight: 800; font-size: 1.5rem; letter-spacing: -0.02em; color: #4a9d6a; line-height: 1.1;\">{{ brightSpotValue }}<\u002Fdiv><div style=\"font-size: 0.8125rem; color: #ddd3bd; margin-top: 0.35rem;\">{{ brightSpotDetail }}<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== 01 · COMPOSITE SCORE VS INDUSTRY ===== -->\n  <section id=\"sec-01\" style=\"padding: 2.75rem 3rem; border-bottom: 1px solid #c9bfa6; scroll-margin-top: 1.5rem;\">\n    <div style=\"font-family: 'Geist Mono', monospace; font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: #3a3326; margin-bottom: 1rem;\"><b style=\"color: #d62524; font-weight: 700;\">01<\u002Fb> · Where You Stand Compared To The Rest Of The Industry<\u002Fdiv>\n    <h2 style=\"font-family: 'Geist', sans-serif; font-weight: 800; font-size: 2.5rem; line-height: 1.05; letter-spacing: -0.03em; margin-bottom: 1.5rem; color: #0a0a0a; text-wrap: balance;\">Your score is <em style=\"font-style: italic; color: #d62524;\">{{ deltaVsMean }} points above<\u002Fem> the industry average.<\u002Fh2>\n    <p style=\"font-size: 1.0625rem; line-height: 1.6; color: #0a0a0a; max-width: 740px; opacity: 0.88; margin-bottom: 1.5rem;\">Your composite cyber risk score is {{ composite }} out of 100, where 0 is minimal exposure and 100 is critical. The industry mean is {{ industryMean }} and the median is {{ industryMedian }}. You sit above both, and the 75th-percentile line that defines the most-exposed quarter of the sector is only {{ gapToP75 }} points away.<\u002Fp>\n\n    <div style=\"background: #e8e1d1; padding: 2rem; margin: 2rem 0;\">\n      <div style=\"font-family: 'Geist', sans-serif; font-weight: 800; font-size: 1.25rem; letter-spacing: -0.02em;\">Your score against the industry distribution<\u002Fdiv>\n      <div style=\"font-family: 'Geist Mono', monospace; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: #3a3326; margin-top: 0.4rem;\">0 = minimal · 100 = critical · industry n = {{ industryNFmt }}<\u002Fdiv>\n\n      <div style=\"display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: #c9bfa6; margin: 1.5rem 0 2.5rem; border: 1px solid #c9bfa6;\">\n        <div style=\"background: #f1ece0; padding: 1.1rem 1.25rem;\"><div style=\"font-family: 'Geist Mono', monospace; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: #3a3326;\">You<\u002Fdiv><div style=\"font-family: 'Geist', sans-serif; font-weight: 800; font-size: 3rem; line-height: 1; letter-spacing: -0.03em; margin-top: 0.35rem; color: #d62524;\">{{ composite }}<\u002Fdiv><\u002Fdiv>\n        <div style=\"background: #f1ece0; padding: 1.1rem 1.25rem;\"><div style=\"font-family: 'Geist Mono', monospace; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: #3a3326;\">Industry mean<\u002Fdiv><div style=\"font-family: 'Geist', sans-serif; font-weight: 800; font-size: 3rem; line-height: 1; letter-spacing: -0.03em; margin-top: 0.35rem; color: #cf6a22;\">{{ industryMean }}<\u002Fdiv><\u002Fdiv>\n        <div style=\"background: #f1ece0; padding: 1.1rem 1.25rem;\"><div style=\"font-family: 'Geist Mono', monospace; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: #3a3326;\">Industry median<\u002Fdiv><div style=\"font-family: 'Geist', sans-serif; font-weight: 800; font-size: 3rem; line-height: 1; letter-spacing: -0.03em; margin-top: 0.35rem; color: #d59a2e;\">{{ industryMedian }}<\u002Fdiv><\u002Fdiv>\n        <div style=\"background: #f1ece0; padding: 1.1rem 1.25rem;\"><div style=\"font-family: 'Geist Mono', monospace; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: #3a3326;\">75th percentile<\u002Fdiv><div style=\"font-family: 'Geist', sans-serif; font-weight: 800; font-size: 3rem; line-height: 1; letter-spacing: -0.03em; margin-top: 0.35rem; color: #9c1f1e;\">{{ p75 }}<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"position: relative; margin: 0 0 1.5rem; padding-top: 2.4rem;\">\n        <div style=\"position: absolute; top: 0; bottom: 26px; left: {{ medianPct }}%; width: 0; border-left: 2px dashed #0a0a0a;\"><span style=\"position: absolute; top: 0; left: 6px; white-space: nowrap; font-family: 'Geist Mono', monospace; font-size: 9.5px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: #0a0a0a;\">Critical threshold<\u002Fspan><\u002Fdiv>\n        <div style=\"position: absolute; top: 0; bottom: 26px; left: {{ meanPct }}%; width: 0; border-left: 2px dashed #cf6a22;\"><span style=\"position: absolute; top: 0; left: 6px; white-space: nowrap; font-family: 'Geist Mono', monospace; font-size: 9.5px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: #cf6a22;\">Mean {{ industryMean }}<\u002Fspan><\u002Fdiv>\n        <div style=\"position: absolute; bottom: 24px; left: {{ compositePct }}%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center;\"><span style=\"font-family: 'Geist Mono', monospace; font-size: 10.5px; font-weight: 800; letter-spacing: 0.05em; text-transform: uppercase; white-space: nowrap; margin-bottom: 3px; color: #d62524;\">You {{ composite }}<\u002Fspan><span style=\"width: 16px; height: 16px; border-radius: 50%; border: 3px solid #d62524; background: #fff; box-shadow: 0 0 0 2px #e8e1d1;\"><\u002Fspan><\u002Fdiv>\n        <div style=\"height: 16px; border-radius: 8px; background: linear-gradient(90deg, #3f8f5e 0%, #6fae6a 22%, #d59a2e 50%, #cf6a22 72%, #d62524 100%);\"><\u002Fdiv>\n        <div style=\"display: flex; justify-content: space-between; margin-top: 0.5rem; font-family: 'Geist Mono', monospace; font-size: 10px; color: #3a3326;\"><span>0<\u002Fspan><span>25<\u002Fspan><span>50<\u002Fspan><span>75<\u002Fspan><span>100<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"font-family: 'Geist', sans-serif; font-weight: 700; font-size: 1.0625rem; line-height: 1.4; border-top: 1px solid #c9bfa6; padding-top: 1.25rem;\">About half of the industry sits below the Critical threshold. Your score of {{ composite }} currently places you among the more-exposed operators nationwide, which also means there is clear, achievable room to improve.<\u002Fdiv>\n    <\u002Fdiv>\n\n    <p style=\"font-size: 0.9375rem; line-height: 1.65; color: #0a0a0a; max-width: 740px;\">The distribution is heavily weighted toward the high-risk end, the median ({{ industryMedian }}) is higher than the mean ({{ industryMean }}) because a small group of well-secured operators pulls the average down. Landing at {{ composite }} means you sit above the typical operator in an industry that already carries significant exposure overall. The gap to the average is easily remediable with readily available fixes.<\u002Fp>\n    <div style=\"border-top: 1px solid #c9bfa6; margin: 2.5rem 0;\"><\u002Fdiv>\n    <h2 style=\"font-family: 'Geist', sans-serif; font-weight: 800; font-size: 2.5rem; line-height: 1.05; letter-spacing: -0.03em; margin-bottom: 1.5rem; color: #0a0a0a; text-wrap: balance;\">{{ saferFraction }} operators are <em style=\"font-style: italic; color: #d62524;\">safer than you<\u002Fem>.<\u002Fh2>\n\n    <div style=\"display: grid; grid-template-columns: 1.2fr 2fr; gap: 2rem; align-items: center; background: #e8e1d1; padding: 2rem; margin: 1.5rem 0;\">\n      <div style=\"font-family: 'Geist', sans-serif; font-weight: 800; font-size: 5rem; line-height: 0.9; letter-spacing: -0.04em; color: #d62524;\">{{ industryPct }}<span style=\"font-size: 2.5rem;\">th<\u002Fspan><\u002Fdiv>\n      <div style=\"font-family: 'Geist', sans-serif; font-weight: 700; font-size: 1.375rem; line-height: 1.3; letter-spacing: -0.01em; color: #0a0a0a;\">Your percentile rank compared to other telcos. Put plainly: <em style=\"font-style: italic; font-weight: 800; color: #d62524;\">{{ industryPct }}% of operators carry less risk than you<\u002Fem>, and only {{ inversePct }}% carry more.<\u002Fdiv>\n    <\u002Fdiv>\n\n    <p style=\"font-size: 0.9375rem; line-height: 1.65; color: #0a0a0a; max-width: 740px; margin-bottom: 1rem;\">Percentile rank answers the question a raw score can't: how do you compare to everyone else being measured the same way? We ranked all {{ industryNFmt }} scored operators from lowest cyber risk to highest and located you in that line-up, twice. Once against the whole industry, and once against only your {{ segmentName }} peers.<\u002Fp>\n\n    <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: #c9bfa6; border: 1px solid #c9bfa6; margin: 2rem 0;\">\n      <div style=\"background: #f1ece0; padding: 1.75rem 1.5rem;\">\n        <div style=\"font-family: 'Geist Mono', monospace; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: #3a3326; margin-bottom: 0.75rem;\">Against all US telcos<\u002Fdiv>\n        <div style=\"position: relative; height: 44px; background: rgba(10,10,10,0.05); margin-bottom: 0.6rem;\">\n          <div style=\"position: absolute; top: 0; bottom: 0; left: 0; width: {{ industryPct }}%; background: linear-gradient(90deg, #d59a2e, #d62524);\"><\u002Fdiv>\n          <div style=\"position: absolute; top: 0; bottom: 0; left: {{ industryPct }}%; width: 3px; background: #0a0a0a;\"><\u002Fdiv>\n          <div style=\"position: absolute; top: 50%; left: {{ industryPct }}%; transform: translate(-100%,-50%); padding-right: 8px; font-family: 'Geist Mono', monospace; font-size: 11px; font-weight: 700; color: #fff;\">YOU<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"font-size: 0.8125rem; color: #3a3326; line-height: 1.5;\">Higher cyber risk than <strong style=\"color: #0a0a0a;\">{{ industryWorseThanFmt }} of {{ industryNFmt }}<\u002Fstrong> operators.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background: #f1ece0; padding: 1.75rem 1.5rem;\">\n        <div style=\"font-family: 'Geist Mono', monospace; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: #3a3326; margin-bottom: 0.75rem;\">Against {{ segmentShort }} peers only<\u002Fdiv>\n        <div style=\"position: relative; height: 44px; background: rgba(10,10,10,0.05); margin-bottom: 0.6rem;\">\n          <div style=\"position: absolute; top: 0; bottom: 0; left: 0; width: {{ peerPct }}%; background: linear-gradient(90deg, #d59a2e, #cf6a22);\"><\u002Fdiv>\n          <div style=\"position: absolute; top: 0; bottom: 0; left: {{ peerPct }}%; width: 3px; background: #0a0a0a;\"><\u002Fdiv>\n          <div style=\"position: absolute; top: 50%; left: {{ peerPct }}%; transform: translate(-100%,-50%); padding-right: 8px; font-family: 'Geist Mono', monospace; font-size: 11px; font-weight: 700; color: #fff;\">YOU<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"font-size: 0.8125rem; color: #3a3326; line-height: 1.5;\">Higher cyber risk than <strong style=\"color: #0a0a0a;\">{{ peerWorseThanFmt }} of {{ peerNFmt }}<\u002Fstrong> {{ segmentName }} peers.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"border-left: 4px solid #d62524; padding: 0.75rem 0 0.75rem 1.5rem; margin: 1.5rem 0; font-family: 'Instrument Serif', serif; font-style: italic; font-size: 1.375rem; line-height: 1.35; color: #0a0a0a; max-width: 720px;\">{{ peerPullQuote }}<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== 03 · PEER COMPARISON ===== -->\n  <section id=\"sec-03\" style=\"padding: 2.75rem 3rem; border-bottom: 1px solid #c9bfa6; scroll-margin-top: 1.5rem;\">\n    <div style=\"font-family: 'Geist Mono', monospace; font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: #3a3326; margin-bottom: 1rem;\"><b style=\"color: #d62524; font-weight: 700;\">02<\u002Fb> · How You Compare to Your Peers<\u002Fdiv>\n    <h2 style=\"font-family: 'Geist', sans-serif; font-weight: 800; font-size: 2.5rem; line-height: 1.05; letter-spacing: -0.03em; margin-bottom: 1.5rem; color: #0a0a0a; text-wrap: balance;\">Measured against operators <em style=\"font-style: italic; color: #d62524;\">exactly like you<\u002Fem>.<\u002Fh2>\n    <p style=\"font-size: 1.0625rem; line-height: 1.6; color: #0a0a0a; max-width: 740px; opacity: 0.88; margin-bottom: 1.5rem;\">You are a {{ segmentName }} operator ({{ segmentShort }}). There are {{ peerNFmt }} of you in the analyzed base. Comparing you to that group helps set size and geography aside. On most indicators that matter, your scores are higher than the {{ segmentShort }} peer averages.<\u002Fp>\n\n    <div style=\"margin: 1.5rem 0; border: 1px solid rgba(10,18,32,0.12); background: #f1ece0;\">\n      <div style=\"padding: 0.75rem 1.25rem; background: #e8e1d1; display: grid; grid-template-columns: 1fr 130px 120px 90px; gap: 1rem; font-family: 'Geist Mono', monospace; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: #3a3326; font-weight: 600;\"><span>Indicator<\u002Fspan><span style=\"text-align: right;\">{{ segmentShort }} average<\u002Fspan><span style=\"text-align: right;\">You<\u002Fspan><span style=\"text-align: right;\">Verdict<\u002Fspan><\u002Fdiv>\n      <sc-for list=\"{{ peerTable }}\" as=\"row\" hint-placeholder-count=\"6\">\n      <div style=\"padding: 0.75rem 1.25rem; display: grid; grid-template-columns: 1fr 130px 120px 90px; gap: 1rem; border-bottom: 1px dashed #c9bfa6; font-size: 0.875rem; align-items: center;\"><span style=\"font-weight: 600; color: #0a0a0a;\">{{ row.indicator }}<\u002Fspan><span style=\"font-family: 'Geist Mono', monospace; font-weight: 600; text-align: right; color: #3a3326;\">{{ row.peerAvg }}<\u002Fspan><span style=\"font-family: 'Geist Mono', monospace; font-weight: 700; text-align: right; color: {{ row.color }};\">{{ row.you }}<\u002Fspan><span style=\"font-family: 'Geist Mono', monospace; font-weight: 700; text-align: right; color: {{ row.color }};\">{{ row.verdict }}<\u002Fspan><\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <p style=\"font-size: 0.9375rem; line-height: 1.65; color: #0a0a0a; max-width: 740px;\">Where a dimension is genuinely cleaner than the peer average, it shows as a win above. Everywhere else, you carry more exposure than a typical peer, not because of size or footprint, but because of unpatched systems, exposed services and forgotten DNS records that peers of the same profile have addressed and you have not yet.<\u002Fp>\n  <\u002Fsection>\n\n  <!-- ===== 04 · PILLAR-BY-PILLAR BENCHMARK ===== -->\n  <section id=\"sec-04\" style=\"padding: 2.75rem 3rem; border-bottom: 1px solid #c9bfa6; scroll-margin-top: 1.5rem;\">\n    <div style=\"font-family: 'Geist Mono', monospace; font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: #3a3326; margin-bottom: 1rem;\"><b style=\"color: #d62524; font-weight: 700;\">03<\u002Fb> · Pillar-by-Pillar Benchmark<\u002Fdiv>\n    <h2 style=\"font-family: 'Geist', sans-serif; font-weight: 800; font-size: 2.5rem; line-height: 1.05; letter-spacing: -0.03em; margin-bottom: 1.5rem; color: #0a0a0a; text-wrap: balance;\">{{ aboveCountWord }} of {{ pillarsLen }} pillars are <em style=\"font-style: italic; color: #d62524;\">above the industry line<\u002Fem>.<\u002Fh2>\n    <p style=\"font-size: 1.0625rem; line-height: 1.6; color: #0a0a0a; max-width: 740px; opacity: 0.88; margin-bottom: 0.5rem;\">Each pillar is scored 0–100 (higher indicates more risk) and weighted into the composite. Your bar is red where you sit above the industry average, green where you sit below it. The heavier the weight, the more each gap can cost you.<\u002Fp>\n\n    <div style=\"display: flex; flex-direction: column; gap: 1.5rem; margin: 2.25rem 0;\">\n      <sc-for list=\"{{ pillars }}\" as=\"pillar\" hint-placeholder-count=\"5\">\n      <div>\n        <div style=\"display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 0.6rem;\"><div style=\"font-family: 'Geist', sans-serif; font-weight: 700; font-size: 1rem; color: #0a0a0a;\">{{ pillar.id }} · {{ pillar.name }} <span style=\"font-family: 'Geist Mono', monospace; font-size: 10px; color: #3a3326; letter-spacing: 0.08em;\">· {{ pillar.weightLabel }}<\u002Fspan><\u002Fdiv><div style=\"font-family: 'Geist Mono', monospace; font-size: 11px; font-weight: 700; color: #d62524;\">Your score {{ pillar.score }}<\u002Fdiv><\u002Fdiv>\n        <div style=\"position: relative; height: 30px; background: rgba(10,10,10,0.05); margin-top: 20px;\"><div style=\"height: 100%; min-width: 44px; width: {{ pillar.width }}%; background: {{ pillar.barColor }}; position: relative;\"><span style=\"position: absolute; top: 50%; right: 8px; transform: translateY(-50%); font-family: 'Geist Mono', monospace; font-weight: 800; font-size: 0.9375rem; color: #fff;\">{{ pillar.score }}<\u002Fspan><\u002Fdiv><div style=\"position: absolute; top: -18px; bottom: -4px; left: {{ pillar.markerLeft }}%; width: 2px; background: #0a0a0a;\"><span style=\"position: absolute; top: -2px; left: 5px; white-space: nowrap; font-family: 'Geist Mono', monospace; font-size: 9px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; color: #0a0a0a;\">Industry avg {{ pillar.avg }}<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <div style=\"display: flex; gap: 1rem; margin: 1rem 0 1.5rem; flex-wrap: wrap; font-family: 'Geist Mono', monospace; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: #3a3326;\">\n      <div style=\"display: flex; align-items: center; gap: 0.5rem;\"><span style=\"width: 12px; height: 12px; background: #d62524;\"><\u002Fspan>Above industry average (more risk)<\u002Fdiv>\n      <div style=\"display: flex; align-items: center; gap: 0.5rem;\"><span style=\"width: 12px; height: 12px; background: #4a9d6a;\"><\u002Fspan>Below average (less risk)<\u002Fdiv>\n      <div style=\"display: flex; align-items: center; gap: 0.5rem;\"><span style=\"width: 2px; height: 12px; background: #0a0a0a;\"><\u002Fspan>Industry average<\u002Fdiv>\n    <\u002Fdiv>\n\n    <p style=\"font-size: 0.9375rem; line-height: 1.65; color: #0a0a0a; max-width: 740px;\">Your composite is dominated by <strong>{{ top1Name }} ({{ top1Score }})<\u002Fstrong> and <strong>{{ top2Name }} ({{ top2Score }})<\u002Fstrong>, the two heaviest-weighted pillars, together this constitutes {{ combinedWeight }}% of your overall score. Under our max-dominant rule, the single highest-scoring pillar drives the headline, so your top pillar accounts for most of the composite. The good news hidden in this chart: your highest-scoring pillars are also the ones with the fastest, easiest fixes.<\u002Fp>\n  <\u002Fsection>\n\n  <!-- ===== 05 · WHERE YOU WIN, WHERE YOU LOSE ===== -->\n  <section id=\"sec-05\" style=\"padding: 2.75rem 3rem; border-bottom: 1px solid #c9bfa6; scroll-margin-top: 1.5rem;\">\n    <div style=\"font-family: 'Geist Mono', monospace; font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: #3a3326; margin-bottom: 1rem;\"><b style=\"color: #d62524; font-weight: 700;\">04<\u002Fb> · Where You Win, Where You Lose<\u002Fdiv>\n    <h2 style=\"font-family: 'Geist', sans-serif; font-weight: 800; font-size: 2.5rem; line-height: 1.05; letter-spacing: -0.03em; margin-bottom: 1.5rem; color: #0a0a0a; text-wrap: balance;\">The <em style=\"font-style: italic; color: #d62524;\">short version<\u002Fem> of your posture.<\u002Fh2>\n\n    <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: rgba(10,18,32,0.12); border: 1px solid rgba(10,18,32,0.12); margin: 1.5rem 0;\">\n      <div style=\"background: #f1ece0; padding: 1.75rem 1.5rem;\">\n        <div style=\"font-family: 'Geist Mono', monospace; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: #4a9d6a; font-weight: 700; margin-bottom: 1rem;\">What's working<\u002Fdiv>\n        <div style=\"display: flex; flex-direction: column; gap: 1rem;\">\n          <sc-for list=\"{{ winWorking }}\" as=\"item\" hint-placeholder-count=\"3\">\n          <div style=\"display: grid; grid-template-columns: 8px 1fr; gap: 0.9rem;\"><div style=\"width: 8px; height: 8px; border-radius: 50%; background: #4a9d6a; margin-top: 0.4rem;\"><\u002Fdiv><div><div style=\"font-family: 'Geist', sans-serif; font-weight: 700; font-size: 0.9375rem; color: #0a0a0a;\">{{ item.title }}<\u002Fdiv><div style=\"font-size: 0.8125rem; line-height: 1.5; color: #3a3326;\">{{ item.detail }}<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background: #f1ece0; padding: 1.75rem 1.5rem;\">\n        <div style=\"font-family: 'Geist Mono', monospace; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: #d62524; font-weight: 700; margin-bottom: 1rem;\">What's exposing you<\u002Fdiv>\n        <div style=\"display: flex; flex-direction: column; gap: 1rem;\">\n          <sc-for list=\"{{ winExposing }}\" as=\"item\" hint-placeholder-count=\"4\">\n          <div style=\"display: grid; grid-template-columns: 8px 1fr; gap: 0.9rem;\"><div style=\"width: 8px; height: 8px; border-radius: 50%; background: #d62524; margin-top: 0.4rem;\"><\u002Fdiv><div><div style=\"font-family: 'Geist', sans-serif; font-weight: 700; font-size: 0.9375rem; color: #0a0a0a;\">{{ item.title }}<\u002Fdiv><div style=\"font-size: 0.8125rem; line-height: 1.5; color: #3a3326;\">{{ item.detail }}<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"border-left: 4px solid #d62524; padding: 0.75rem 0 0.75rem 1.5rem; margin: 1.5rem 0; font-family: 'Instrument Serif', serif; font-style: italic; font-size: 1.375rem; line-height: 1.35; color: #0a0a0a; max-width: 720px;\">{{ winLosePullQuote }}<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== 06 · NINE INDICATORS BENCHMARKED ===== -->\n  <section id=\"sec-06\" style=\"padding: 2.75rem 3rem; border-bottom: 1px solid #c9bfa6; scroll-margin-top: 1.5rem;\">\n    <div style=\"font-family: 'Geist Mono', monospace; font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: #3a3326; margin-bottom: 1rem;\"><b style=\"color: #d62524; font-weight: 700;\">05<\u002Fb> · What To Fix, By Indicator<\u002Fdiv>\n    <h2 style=\"font-family: 'Geist', sans-serif; font-weight: 800; font-size: 2.5rem; line-height: 1.05; letter-spacing: -0.03em; margin-bottom: 1.5rem; color: #0a0a0a; text-wrap: balance;\">Each indicator, and <em style=\"font-style: italic; color: #d62524;\">how to close it<\u002Fem>.<\u002Fh2>\n    <p style=\"font-size: 1.0625rem; line-height: 1.6; color: #0a0a0a; max-width: 740px; opacity: 0.88; margin-bottom: 1.5rem;\">For every indicator where you currently carry exposure, here is the specific corrective action, ordered so the highest-impact fixes come first.<\u002Fp>\n\n    <div style=\"border: 1px solid rgba(10,18,32,0.12); background: #f1ece0; margin: 1.5rem 0;\">\n      <sc-for list=\"{{ indicatorsTop }}\" as=\"ind\" hint-placeholder-count=\"6\">\n      <div style=\"display: grid; grid-template-columns: 40px 1fr 1.5fr; gap: 1.5rem; padding: 1.35rem 1.5rem; border-bottom: 1px dashed #c9bfa6; align-items: start;\">\n        <div style=\"font-family: 'Geist', sans-serif; font-weight: 800; font-size: 1.5rem; line-height: 1; color: #d62524;\">{{ ind.num }}<\u002Fdiv>\n        <div>\n          <div style=\"font-family: 'Geist', sans-serif; font-weight: 800; font-size: 1.05rem; letter-spacing: -0.01em; line-height: 1.15; color: #0a0a0a;\">{{ ind.label }}<\u002Fdiv>\n          <div style=\"display: inline-block; margin-top: 0.55rem; padding: 0.2rem 0.5rem; font-family: 'Geist Mono', monospace; font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; font-weight: 700; color: #fff; background: {{ ind.statusColor }};\">You: {{ ind.statusText }}<\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-family: 'Geist Mono', monospace; font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; font-weight: 700; color: #d62524; margin-bottom: 0.4rem;\">What to do<\u002Fdiv>\n          <div style=\"font-size: 0.9rem; line-height: 1.55; color: #0a0a0a;\">{{ ind.guidance }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== 07 · DETAILED FINDINGS ===== -->\n  <section id=\"sec-07\" style=\"padding: 2.75rem 3rem; border-bottom: 1px solid #c9bfa6; scroll-margin-top: 1.5rem;\">\n    <div style=\"font-family: 'Geist Mono', monospace; font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: #3a3326; margin-bottom: 1rem;\"><b style=\"color: #d62524; font-weight: 700;\">06<\u002Fb> · Detailed Findings For You To Address Immediately<\u002Fdiv>\n    <h2 style=\"font-family: 'Geist', sans-serif; font-weight: 800; font-size: 2.5rem; line-height: 1.05; letter-spacing: -0.03em; margin-bottom: 1.5rem; color: #0a0a0a; text-wrap: balance;\">The <em style=\"font-style: italic; color: #d62524;\">specific exposures<\u002Fem> behind your score.<\u002Fh2>\n    <p style=\"font-size: 1.0625rem; line-height: 1.6; color: #0a0a0a; max-width: 740px; opacity: 0.88; margin-bottom: 0.5rem;\">Every finding below was observed from public, non-intrusive sources, no authenticated access. Each maps to one of the Cyber Risk indicators and to a specific corrective action you can easily take to mitigate harm.<\u002Fp>\n\n    <!-- Known Exploited Vulnerabilities -->\n    <h3 style=\"font-family: 'Geist', sans-serif; font-weight: 700; font-size: 1.25rem; line-height: 1.3; letter-spacing: -0.015em; color: #0a0a0a; margin: 2.5rem 0 1rem;\">Known exploited vulnerabilities <em style=\"font-style: italic; color: #d62524;\">({{ kevCount }})<\u002Fem><\u002Fh3>\n    <div style=\"border: 1px solid rgba(10,18,32,0.12); background: #f1ece0;\">\n      <div style=\"padding: 0.875rem 1.25rem; background: #e8e1d1; font-family: 'Geist Mono', monospace; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: #0a0a0a; font-weight: 600; border-bottom: 1px solid #c9bfa6; display: grid; grid-template-columns: 150px 1fr 78px 96px; gap: 1rem;\"><span>CVE<\u002Fspan><span>Asset · description<\u002Fspan><span style=\"text-align: right;\">EPSS<\u002Fspan><span style=\"text-align: right;\">Flag<\u002Fspan><\u002Fdiv>\n      <sc-for list=\"{{ kev }}\" as=\"row\" hint-placeholder-count=\"5\">\n      <div style=\"padding: 0.85rem 1.25rem; display: grid; grid-template-columns: 150px 1fr 78px 96px; gap: 1rem; border-bottom: 1px dashed #c9bfa6; font-size: 0.875rem; align-items: center;\"><span style=\"font-family: 'Geist Mono', monospace; font-weight: 700; color: {{ row.cveColor }};\">{{ row.cve }}<\u002Fspan><span>{{ row.asset }}<div style=\"font-size: 0.75rem; color: #3a3326; margin-top: 0.15rem;\">{{ row.description }}<\u002Fdiv><\u002Fspan><span style=\"font-family: 'Geist Mono', monospace; font-weight: 700; text-align: right; color: {{ row.epssColor }};\">{{ row.epss }}<\u002Fspan><span style=\"text-align: right;\"><span style=\"font-family: 'Geist Mono', monospace; font-size: 9px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: {{ row.flagColor }}; background: {{ row.flagBg }}; padding: 0.2rem 0.4rem;\">{{ row.flag }}<\u002Fspan><\u002Fspan><\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <!-- Dangling DNS -->\n    <h3 style=\"font-family: 'Geist', sans-serif; font-weight: 700; font-size: 1.25rem; line-height: 1.3; letter-spacing: -0.015em; color: #0a0a0a; margin: 2.5rem 0 1rem;\">Dangling DNS records <em style=\"font-style: italic; color: #d62524;\">({{ danglingCount }})<\u002Fem><\u002Fh3>\n    <div style=\"border: 1px solid rgba(10,18,32,0.12); background: #f1ece0;\">\n      <div style=\"padding: 0.875rem 1.25rem; background: #e8e1d1; font-family: 'Geist Mono', monospace; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: #0a0a0a; font-weight: 600; border-bottom: 1px solid #c9bfa6; display: grid; grid-template-columns: 1fr 1fr 110px; gap: 1rem;\"><span>Subdomain<\u002Fspan><span>Points to<\u002Fspan><span style=\"text-align: right;\">Status<\u002Fspan><\u002Fdiv>\n      <sc-for list=\"{{ dangling }}\" as=\"row\" hint-placeholder-count=\"3\">\n      <div style=\"padding: 0.85rem 1.25rem; display: grid; grid-template-columns: 1fr 1fr 110px; gap: 1rem; border-bottom: 1px dashed #c9bfa6; font-size: 0.875rem; align-items: center;\"><span style=\"font-family: 'Geist Mono', monospace; color: #0a0a0a;\">{{ row.subdomain }}<\u002Fspan><span style=\"color: #3a3326;\">{{ row.pointsTo }}<\u002Fspan><span style=\"text-align: right;\"><span style=\"font-family: 'Geist Mono', monospace; font-size: 9px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: {{ row.statusColor }}; background: {{ row.statusBg }}; padding: 0.2rem 0.4rem;\">{{ row.status }}<\u002Fspan><\u002Fspan><\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <!-- Email + exposed services, two-up -->\n    <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: rgba(10,18,32,0.12); border: 1px solid rgba(10,18,32,0.12); margin: 2.5rem 0 0;\">\n      <div style=\"background: #f1ece0; padding: 1.5rem 1.5rem 1.75rem;\">\n        <div style=\"font-family: 'Geist Mono', monospace; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: #3a3326; font-weight: 700; margin-bottom: 1rem;\">Email authentication<\u002Fdiv>\n        <sc-for list=\"{{ emailRows }}\" as=\"r\" hint-placeholder-count=\"3\">\n        <div style=\"display: flex; justify-content: space-between; padding: 0.5rem 0; border-bottom: 1px dashed #c9bfa6; font-size: 0.875rem;\"><span>{{ r.label }}<\u002Fspan><span style=\"font-family: 'Geist Mono', monospace; font-weight: 700; color: {{ r.color }};\">{{ r.value }}<\u002Fspan><\u002Fdiv>\n        <\u002Fsc-for>\n        <div style=\"font-size: 0.8125rem; color: #3a3326; line-height: 1.5; margin-top: 0.9rem; padding-top: 0.9rem; border-top: 1px solid #c9bfa6;\">{{ emailNote }}<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background: #f1ece0; padding: 1.5rem 1.5rem 1.75rem;\">\n        <div style=\"font-family: 'Geist Mono', monospace; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: #3a3326; font-weight: 700; margin-bottom: 1rem;\">Exposed services<\u002Fdiv>\n        <sc-for list=\"{{ serviceRows }}\" as=\"r\" hint-placeholder-count=\"3\">\n        <div style=\"display: flex; justify-content: space-between; padding: 0.5rem 0; border-bottom: 1px dashed #c9bfa6; font-size: 0.875rem;\"><span>{{ r.label }}<\u002Fspan><span style=\"font-family: 'Geist Mono', monospace; font-weight: 700; color: {{ r.color }};\">{{ r.value }}<\u002Fspan><\u002Fdiv>\n        <\u002Fsc-for>\n        <div style=\"font-size: 0.8125rem; color: #3a3326; line-height: 1.5; margin-top: 0.9rem; padding-top: 0.9rem; border-top: 1px solid #c9bfa6;\">{{ servicesNote }}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== 08 · WHAT AN INCIDENT WOULD COST YOU ===== -->\n  <section id=\"sec-08\" style=\"padding: 2.75rem 3rem; border-bottom: 1px solid #c9bfa6; scroll-margin-top: 1.5rem;\">\n    <div style=\"font-family: 'Geist Mono', monospace; font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: #3a3326; margin-bottom: 1rem;\"><b style=\"color: #d62524; font-weight: 700;\">07<\u002Fb> · What an Incident Would Cost You<\u002Fdiv>\n    <h2 style=\"font-family: 'Geist', sans-serif; font-weight: 800; font-size: 2.5rem; line-height: 1.05; letter-spacing: -0.03em; margin-bottom: 1.5rem; color: #0a0a0a; text-wrap: balance;\">At your revenue tier, a single cybersecurity incident can become an <em style=\"font-style: italic; color: #d62524;\">existential threat<\u002Fem> for your continued operations.<\u002Fh2>\n    <p style=\"font-size: 1.0625rem; line-height: 1.6; color: #0a0a0a; max-width: 740px; opacity: 0.88; margin-bottom: 1.5rem;\">You sit in the {{ revenueTier }} revenue tier, the epicenter cohort. Too large to be operationally invisible, too small to self-insure or fund a dedicated security function. This is precisely the band where a ransomware incident most often ends the business rather than bruising it.<\u002Fp>\n\n    <div style=\"display: grid; grid-template-columns: 1.2fr 2fr; gap: 2rem; align-items: center; background: #e8e1d1; padding: 2rem; margin: 1.5rem 0;\">\n      <div style=\"font-family: 'Geist', sans-serif; font-weight: 800; font-size: 3.75rem; line-height: 0.9; letter-spacing: -0.04em; color: #d62524;\">{{ costHeadlineLow }}<br><span style=\"font-size: 1.75rem; color: #0a0a0a;\">to<\u002Fspan><br>{{ costHeadlineHigh }}<\u002Fdiv>\n      <div style=\"font-family: 'Geist', sans-serif; font-weight: 700; font-size: 1.25rem; line-height: 1.3; letter-spacing: -0.01em; color: #0a0a0a;\">estimated total cost of a ransomware-class incident with customer-data exfiltration for an operator your size. Against your current risk posture, the probability of such an event is <em style=\"font-style: italic; font-weight: 800; color: #d62524;\">materially elevated<\u002Fem>.<\u002Fdiv>\n    <\u002Fdiv>\n\n    <h3 style=\"font-family: 'Geist', sans-serif; font-weight: 700; font-size: 1.25rem; line-height: 1.3; letter-spacing: -0.015em; color: #0a0a0a; margin: 2.5rem 0 1rem;\">The full projected economics of your worst cybersecurity nightmare.<\u002Fh3>\n    <div style=\"margin: 1.5rem 0; border: 1px solid rgba(10,18,32,0.12); background: #f1ece0;\">\n      <div style=\"padding: 0.875rem 1.25rem; background: #e8e1d1; font-family: 'Geist Mono', monospace; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: #0a0a0a; font-weight: 600; border-bottom: 1px solid #c9bfa6; display: grid; grid-template-columns: 1fr 110px 110px; gap: 1rem;\"><span>Expense item<\u002Fspan><span style=\"text-align: right;\">Low<\u002Fspan><span style=\"text-align: right;\">High<\u002Fspan><\u002Fdiv>\n      <sc-for list=\"{{ costLines }}\" as=\"row\" hint-placeholder-count=\"6\">\n      <div style=\"padding: 0.75rem 1.25rem; display: grid; grid-template-columns: 1fr 110px 110px; gap: 1rem; border-bottom: 1px dashed #c9bfa6; font-size: 0.875rem;\"><div>{{ row.label }}<div style=\"font-size: 0.75rem; color: #3a3326; margin-top: 0.2rem;\">{{ row.detail }}<\u002Fdiv><\u002Fdiv><div style=\"font-family: 'Geist Mono', monospace; font-weight: 600; text-align: right;\">{{ row.low }}<\u002Fdiv><div style=\"font-family: 'Geist Mono', monospace; font-weight: 600; text-align: right;\">{{ row.high }}<\u002Fdiv><\u002Fdiv>\n      <\u002Fsc-for>\n      <div style=\"padding: 1rem 1.25rem; background: #0a0a0a; color: #f1ece0; display: grid; grid-template-columns: 1fr 110px 110px; gap: 1rem; align-items: center; font-size: 0.9375rem;\"><div style=\"font-family: 'Geist', sans-serif; font-weight: 700;\">Total realistic range<\u002Fdiv><div style=\"font-family: 'Geist Mono', monospace; font-weight: 800; text-align: right; font-size: 1.35rem; color: #ff5a4a;\">{{ costTotalLow }}<\u002Fdiv><div style=\"font-family: 'Geist Mono', monospace; font-weight: 800; text-align: right; font-size: 1.35rem; color: #ff5a4a;\">{{ costTotalHigh }}<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n\n    <p style=\"font-size: 0.9375rem; line-height: 1.65; color: #0a0a0a; max-width: 740px;\">Even at the low end, a single incident costs far more than fixing everything in this report. The corrective actions are a four-to-six engineer-week effort funded from your existing IT budget. The incident they prevent is not.<\u002Fp>\n  <\u002Fsection>\n\n  <!-- ===== 09 · REGULATORY EXPOSURE ===== -->\n  <section id=\"sec-09\" style=\"padding: 2.75rem 3rem; border-bottom: 1px solid #c9bfa6; scroll-margin-top: 1.5rem;\">\n    <div style=\"font-family: 'Geist Mono', monospace; font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: #3a3326; margin-bottom: 1rem;\"><b style=\"color: #d62524; font-weight: 700;\">08<\u002Fb> · Your Regulatory Exposure<\u002Fdiv>\n    <h2 style=\"font-family: 'Geist', sans-serif; font-weight: 800; font-size: 2.5rem; line-height: 1.05; letter-spacing: -0.03em; margin-bottom: 1.5rem; color: #0a0a0a; text-wrap: balance;\">A <em style=\"font-style: italic; color: #d62524;\">seven-day clock<\u002Fem> you are not staffed to beat.<\u002Fh2>\n    <p style=\"font-size: 1.0625rem; line-height: 1.6; color: #0a0a0a; max-width: 740px; opacity: 0.88; margin-bottom: 1.5rem;\">You operate across {{ geographyList }}. That places a single breach inside the FCC's CPNI regime and {{ statesCountWord }} overlapping state notification laws simultaneously, each with its own clock, penalty schedule and reporting format. The rules were written for major carriers with legal departments. You have neither.<\u002Fp>\n\n    <div style=\"display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: rgba(10,18,32,0.12); border: 1px solid rgba(10,18,32,0.12); margin: 1.5rem 0;\">\n      <sc-for list=\"{{ regStats }}\" as=\"r\" hint-placeholder-count=\"3\">\n      <div style=\"background: #f1ece0; padding: 1.5rem 1.25rem;\"><div style=\"font-family: 'Geist Mono', monospace; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: #3a3326; margin-bottom: 0.4rem;\">{{ r.label }}<\u002Fdiv><div style=\"font-family: 'Geist', sans-serif; font-weight: 800; font-size: 2.25rem; line-height: 1; letter-spacing: -0.025em; color: {{ r.color }};\">{{ r.value }}<\u002Fdiv><div style=\"font-size: 0.8125rem; line-height: 1.5; color: #3a3326; margin-top: 0.5rem;\">{{ r.note }}<\u002Fdiv><\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <div style=\"background: #e8e1d1; border-left: 4px solid #d62524; padding: 1.5rem 1.75rem; margin: 1.5rem 0;\">\n      <div style=\"font-family: 'Geist Mono', monospace; font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: #d62524; font-weight: 700; margin-bottom: 0.5rem;\">The compliance trap<\u002Fdiv>\n      <div style=\"font-family: 'Geist', sans-serif; font-weight: 700; font-size: 1.125rem; color: #0a0a0a; margin-bottom: 0.5rem;\">The notification clock is the single largest driver of incident cost, and it starts the moment you discover the breach, not when you are ready.<\u002Fdiv>\n      <div style=\"font-size: 0.9375rem; line-height: 1.6; color: #0a0a0a;\">For an operator with a small team, assembling forensic findings, legal review and multi-state filings inside seven days is not realistic without pre-built process. Delay compounds penalties. This is where the cost in Section 08 runs to the high end.<\u002Fdiv>\n    <\u002Fdiv>\n\n    <p style=\"font-size: 0.9375rem; line-height: 1.65; color: #0a0a0a; max-width: 740px;\">There is also a forward-looking dimension. Federal broadband funding programs such as BEAD are moving toward conditioning eligibility on demonstrable cyber readiness. An operator sitting materially below the sector baseline, as you currently do, risks quiet disqualification from future funding rounds without explicit notice.<\u002Fp>\n  <\u002Fsection>\n\n  <sc-if value=\"{{ showActionPlan }}\" hint-placeholder-val=\"{{ true }}\">\n  <!-- ===== 10 · PRIORITIZED MOVES ===== -->\n  <section id=\"sec-10\" style=\"padding: 2.75rem 3rem; border-bottom: 1px solid #c9bfa6; scroll-margin-top: 1.5rem;\">\n    <div style=\"font-family: 'Geist Mono', monospace; font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: #3a3326; margin-bottom: 1rem;\"><b style=\"color: #d62524; font-weight: 700;\">09<\u002Fb> · Your Prioritized Moves<\u002Fdiv>\n    <h2 style=\"font-family: 'Geist', sans-serif; font-weight: 800; font-size: 2.5rem; line-height: 1.05; letter-spacing: -0.03em; margin-bottom: 1.5rem; color: #0a0a0a; text-wrap: balance;\">{{ movesCountWord }} remediations take you from <em style=\"font-style: italic; color: #d62524;\">{{ fromScore }} to {{ toScore }}<\u002Fem>.<\u002Fh2>\n    <p style=\"font-size: 1.0625rem; line-height: 1.6; color: #0a0a0a; max-width: 740px; opacity: 0.88; margin-bottom: 0.5rem;\">These are ordered for your footprint specifically, the biggest reductions first. Because your score is driven by the max-dominant pillar, clearing your highest-impact exposures alone pulls you out of the {{ fromBandLabel }} band.<\u002Fp>\n\n    <div style=\"background: #e8e1d1; padding: 1.5rem 1.75rem; margin: 2rem 0; display: grid; grid-template-columns: 1fr auto 1fr; gap: 1.5rem; align-items: center;\">\n      <div style=\"text-align: center;\"><div style=\"font-family: 'Geist Mono', monospace; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: #3a3326;\">Today<\u002Fdiv><div style=\"font-family: 'Geist', sans-serif; font-weight: 800; font-size: 3.5rem; line-height: 1; color: {{ fromBandColor }};\">{{ fromScore }}<\u002Fdiv><div style=\"font-family: 'Geist Mono', monospace; font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: {{ fromBandColor }}; font-weight: 700;\">{{ fromBandLabel }}<\u002Fdiv><\u002Fdiv>\n      <div style=\"font-family: 'Geist', sans-serif; font-weight: 800; font-size: 2rem; color: #3a3326;\">→<\u002Fdiv>\n      <div style=\"text-align: center;\"><div style=\"font-family: 'Geist Mono', monospace; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: #3a3326;\">After the remediations<\u002Fdiv><div style=\"font-family: 'Geist', sans-serif; font-weight: 800; font-size: 3.5rem; line-height: 1; color: {{ toBandColor }};\">{{ toScore }}<\u002Fdiv><div style=\"font-family: 'Geist Mono', monospace; font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: {{ toBandColor }}; font-weight: 700;\">{{ toBandLabel }}<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"display: flex; flex-direction: column; gap: 1px; background: rgba(10,18,32,0.12); border: 1px solid rgba(10,18,32,0.12); margin: 1.5rem 0;\">\n      <sc-for list=\"{{ moves }}\" as=\"m\" hint-placeholder-count=\"5\">\n      <div style=\"background: #f1ece0; padding: 1.5rem 1.5rem; display: grid; grid-template-columns: 40px 1fr 150px; gap: 1.25rem; align-items: start;\">\n        <div style=\"font-family: 'Geist', sans-serif; font-weight: 800; font-size: 1.5rem; color: {{ m.numColor }}; line-height: 1;\">{{ m.num }}<\u002Fdiv>\n        <div><div style=\"font-family: 'Geist', sans-serif; font-weight: 700; font-size: 1.0625rem; color: #0a0a0a; margin-bottom: 0.3rem;\">{{ m.titl
