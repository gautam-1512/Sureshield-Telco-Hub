#f1ece0; opacity: 0.8;\">The moves can be actioned in-house. Where there is no internal security team to own them, BorderHawk and SureShield do the work, assessment, continuous exposure monitoring, and the regulatory workload that drives incident cost.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: rgba(241,236,224,0.16); border: 1px solid rgba(241,236,224,0.16);\">\n        <a href=\"https://www.borderhawk.com/home\" target=\"_blank\" rel=\"noopener\" style=\"background: #0a0a0a; padding: 1.5rem 1.35rem; display: flex; flex-direction: column; gap: 0.55rem; text-decoration: none; color: #f1ece0;\" style-hover=\"background: #171717;\">\n          <div style=\"font-family: 'Geist Mono', monospace; font-size: 9.5px; letter-spacing: 0.14em; text-transform: uppercase; color: #d62524; font-weight: 700;\">Assess &amp; remediate<\u002Fdiv>\n          <div style=\"font-family: 'Geist', sans-serif; font-weight: 800; font-size: 1.15rem; letter-spacing: -0.02em;\">BorderHawk<\u002Fdiv>\n          <div style=\"font-size: 0.83rem; line-height: 1.55; opacity: 0.82; flex: 1;\">Independent risk assessment across the nine indicators, then hands-on remediation, KEV patching, remote-access hardening and DNS cleanup on your behalf.<\u002Fdiv>\n          <div style=\"font-family: 'Geist Mono', monospace; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: #a89b7c; padding-top: 0.7rem; border-top: 1px solid rgba(241,236,224,0.16);\">Assess &amp; remediate<\u002Fdiv>\n        <\u002Fa>\n        <a href=\"https://sureshield.ai/\" target=\"_blank\" rel=\"noopener\" style=\"background: #0a0a0a; padding: 1.5rem 1.35rem; display: flex; flex-direction: column; gap: 0.55rem; text-decoration: none; color: #f1ece0;\" style-hover=\"background: #171717;\">\n          <div style=\"font-family: 'Geist Mono', monospace; font-size: 9.5px; letter-spacing: 0.14em; text-transform: uppercase; color: #d62524; font-weight: 700;\">Monitor exposure<\u002Fdiv>\n          <div style=\"font-family: 'Geist', sans-serif; font-weight: 800; font-size: 1.15rem; letter-spacing: -0.02em;\">Threat &amp; Vulnerability Management<\u002Fdiv>\n          <div style=\"font-size: 0.83rem; line-height: 1.55; opacity: 0.82; flex: 1;\">Continuously scans for KEV-listed CVEs, dangling DNS and outdated libraries, ranked by exploitability so effort lands where risk is highest.<\u002Fdiv>\n          <div style=\"font-family: 'Geist Mono', monospace; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: #a89b7c; padding-top: 0.7rem; border-top: 1px solid rgba(241,236,224,0.16);\">Continuous monitoring<\u002Fdiv>\n        <\u002Fa>\n        <a href=\"https://sureshield.ai/\" target=\"_blank\" rel=\"noopener\" style=\"background: #0a0a0a; padding: 1.5rem 1.35rem; display: flex; flex-direction: column; gap: 0.55rem; text-decoration: none; color: #f1ece0;\" style-hover=\"background: #171717;\">\n          <div style=\"font-family: 'Geist Mono', monospace; font-size: 9.5px; letter-spacing: 0.14em; text-transform: uppercase; color: #d62524; font-weight: 700;\">Stay compliant<\u002Fdiv>\n          <div style=\"font-family: 'Geist', sans-serif; font-weight: 800; font-size: 1.15rem; letter-spacing: -0.02em;\">ComplyShield<\u002Fdiv>\n          <div style=\"font-size: 0.83rem; line-height: 1.55; opacity: 0.82; flex: 1;\">Automates FCC CPNI filings, multi-state breach notifications and audit evidence, the regulatory clock that drives the largest share of incident cost.<\u002Fdiv>\n          <div style=\"font-family: 'Geist Mono', monospace; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: #a89b7c; padding-top: 0.7rem; border-top: 1px solid rgba(241,236,224,0.16);\">Covers your {{ geographyShort }} exposure<\u002Fdiv>\n        <\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fsection>\n  <\u002Fsc-if>\n\n  <!-- ===== FINAL CTA ===== -->\n  <div style=\"background: #0a0a0a; color: #f1ece0; padding: 3rem 3rem; border-bottom: 1px solid #0a0a0a;\">\n    <div style=\"font-family: 'Geist Mono', monospace; font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: #d62524; font-weight: 700; margin-bottom: 1.25rem; display: flex; align-items: center; gap: 0.75rem;\"><span style=\"width: 2rem; height: 2px; background: #d62524; display: inline-block;\"><\u002Fspan>The decision in front of you<\u002Fdiv>\n    <h2 style=\"font-family: 'Geist', sans-serif; font-weight: 800; font-size: 2.75rem; line-height: 1.02; letter-spacing: -0.035em; color: #f1ece0; margin-bottom: 1.25rem; max-width: 760px;\">A single exposed port could turn into a <em style=\"font-style: italic; color: #d62524;\">{{ costHeadlineHigh }} damage<\u002Fem>. The fix is a handful of remediations and a few dedicated days of effort.<\u002Fh2>\n    <p style=\"font-size: 1.0625rem; line-height: 1.6; color: #f1ece0; opacity: 0.85; max-width: 640px; margin-bottom: 1.75rem;\">Your score is {{ composite }}. Your peers average {{ peerCompositeAvg }}. The gap is largely configuration, little here needs new capital. The opportunity is to close it before these same public signals are found elsewhere.<\u002Fp>\n    <sc-if value=\"{{ showSolutions }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"display: flex; gap: 0.85rem; flex-wrap: wrap;\">\n      <a href=\"https://www.borderhawk.com/home\" target=\"_blank\" rel=\"noopener\" style=\"font-family: 'Geist Mono', monospace; font-size: 12px; letter-spacing: 0.06em; text-transform: uppercase; font-weight: 700; text-decoration: none; padding: 0.85rem 1.5rem; display: flex; align-items: center; gap: 0.5rem; background: #d62524; color: #fff;\" style-hover=\"background: #f1ece0; color: #0a0a0a;\">Book a risk assessment →<\u002Fa>\n      <a href=\"https://sureshield.ai/\" target=\"_blank\" rel=\"noopener\" style=\"font-family: 'Geist Mono', monospace; font-size: 12px; letter-spacing: 0.06em; text-transform: uppercase; font-weight: 700; text-decoration: none; padding: 0.85rem 1.5rem; display: flex; align-items: center; gap: 0.5rem; background: transparent; color: #f1ece0; border: 1px solid rgba(241,236,224,0.35);\" style-hover=\"background: #f1ece0; color: #0a0a0a;\">Start continuous monitoring →<\u002Fa>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fdiv>\n\n  <!-- ===== FOOTER ===== -->\n  <footer style=\"padding: 1.5rem 3rem; background: #f1ece0; border-top: 1px solid #c9bfa6; display: flex; justify-content: space-between; align-items: center; font-family: 'Geist Mono', monospace; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: #3a3326;\">\n    <div style=\"display: flex; gap: 1.5rem; align-items: center;\">\n      <img src=\"bcb9451c-e7b0-4cf4-88a9-727f0c12ceb5\" alt=\"SureShield\" style=\"height: 32px; width: auto;\">\n      <div style=\"width: 1px; height: 24px; background: rgba(10,18,32,0.2);\"><\u002Fdiv>\n      <img src=\"597160ff-cdc2-4be0-9a1c-bbc0963f5030\" alt=\"BorderHawk\" style=\"height: 28px; width: auto;\">\n    <\u002Fdiv>\n    <div>© {{ reportYear }} · Individual Operator Cyber Risk Benchmark<\u002Fdiv>\n  <\u002Ffooter>\n\n  <!--END-PAGE--><\u002Fdiv>\n<a href=\"#\" id=\"back-to-index\" class=\"noprint\" aria-label=\"Back to top\" style=\"position: fixed; bottom: 2rem; right: 2rem; z-index: 50; display: flex; align-items: center; gap: 0.55rem; padding: 0.7rem 1.1rem; background: #d62524; color: #fff; font-family: 'Geist Mono', monospace; font-size: 0.72rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; text-decoration: none; border-radius: 6px; box-shadow: 0 6px 22px rgba(0,0,0,0.28); opacity: 0; transform: translateY(12px); pointer-events: none; transition: opacity 0.25s ease, transform 0.25s ease;\"><span style=\"font-size: 0.95rem; line-height: 1;\">↑<\u002Fspan><span>Back to top<\u002Fspan><\u002Fa>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;: {&quot;width&quot;: 880, &quot;height&quot;: 1400}, &quot;showActionPlan&quot;: {&quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Report options&quot;}, &quot;showSolutions&quot;: {&quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Report options&quot;}}\">\nclass Component extends DCLogic {\n  state = { d: (typeof window !== 'undefined' && window.REPORT_DATA) || null, flipped: {} };\n\n  componentDidMount() {\n    if (!this.state.d) {\n      const grab = () => { if (window.REPORT_DATA) this.setState({ d: window.REPORT_DATA }); };\n      this._grab = grab;\n      window.addEventListener('reportdata', grab);\n      grab();\n      let n = 0;\n      this._poll = setInterval(() => {\n        if (window.REPORT_DATA) { clearInterval(this._poll); grab(); }\n        else if (++n > 80) clearInterval(this._poll);\n      }, 40);\n    }\n    this._initBackToTop();\n  }\n\n  componentWillUnmount() {\n    if (this._grab) window.removeEventListener('reportdata', this._grab);\n    if (this._poll) clearInterval(this._poll);\n    if (this._onScroll) {\n      window.removeEventListener('scroll', this._onScroll);\n      window.removeEventListener('resize', this._onScroll);\n    }\n  }\n\n  _initBackToTop() {\n    const btn = document.getElementById('back-to-index');\n    if (!btn) return;\n    this._onScroll = () => {\n      const past = window.scrollY > 800;\n      btn.style.opacity = past ? '1' : '0';\n      btn.style.transform = past ? 'translateY(0)' : 'translateY(12px)';\n      btn.style.pointerEvents = past ? 'auto' : 'none';\n    };\n    window.addEventListener('scroll', this._onScroll, { passive: true });\n    window.addEventListener('resize', this._onScroll);\n    this._onScroll();\n  }\n\n  renderVals() {\n    const d = this.state.d;\n    const showActionPlan = this.props.showActionPlan ?? (d ? d.toggles.showActionPlan : true);\n    const showSolutions = this.props.showSolutions ?? (d ? d.toggles.showSolutions : true);\n    if (!d) return { ready: false, showActionPlan, showSolutions };\n\n    const TONE = { critical: '#d62524', high: '#cf6a22', warn: '#d59a2e', good: '#4a9d6a', neutral: '#3a3326' };\n    const tone = t => TONE[t] || TONE.neutral;\n    const fmt = n => Number(n).toLocaleString('en-US');\n    const WORDS = ['zero','one','two','three','four','five','six','seven','eight','nine','ten','eleven','twelve'];\n    const cap = s => (s ? s[0].toUpperCase() + s.slice(1) : s);\n    const word = n => (WORDS[n] != null ? WORDS[n] : String(n));\n\n    const B = d.benchmarks, s = d.score, pc = d.percentile, op = d.operator;\n\n    const bandFor = score => { let b = d.bands[0]; for (const x of d.bands) if (score >= x.min) b = x; return b; };\n    const band = s.bandOverride ? (d.bands.find(b => b.label === s.bandOverride) || bandFor(s.composite)) : bandFor(s.composite);\n    const composite = s.composite;\n\n    // pillars\n    const pillars = d.pillars.map(pl => {\n      const avg = B.pillarIndustryAvg[pl.id];\n      const worse = pl.score > avg;\n      const delta = pl.score - avg;\n      const t = !worse ? 'good' : (delta <= 15 ? 'high' : 'critical');\n      return { ...pl, avg, width: Math.max(0, Math.min(100, pl.score)), markerLeft: avg, barColor: tone(t), weightLabel: pl.weight + '% WEIGHT' };\n    });\n    const pillarName = id => (d.pillars.find(p => p.id === id) || {}).name || '';\n    const aboveCount = pillars.filter(p => p.score > p.avg).length;\n    const byWeight = [...pillars].sort((a, b) => b.weight - a.weight);\n    const top2 = byWeight.slice(0, 2);\n    const combinedWeight = top2.reduce((a, b) => a + b.weight, 0);\n\n    // safer fraction phrase for §02 headline\n    const fractions = [[50,'One out of two'],[60,'Three out of five'],[67,'Two out of three'],[75,'Three out of four'],[80,'Four out of five'],[86,'Six out of seven'],[90,'Nine out of ten'],[95,'Nineteen out of twenty']];\n    let bestF = fractions[0];\n    for (const f of fractions) if (Math.abs(f[0] - pc.industryPct) < Math.abs(bestF[0] - pc.industryPct)) bestF = f;\n    const saferFraction = bestF[1];\n\n    // indicators (guidance list: each indicator + how to fix it)\n    const indicators = d.indicators.map((it, i) => ({\n      ...it,\n      num: i + 1,\n      statusColor: tone(it.youTone),\n      statusText: it.you,\n    }));\n    const failCount = d.indicators.filter(i => i.youTone !== 'good').length;\n    const _topIdx = [0, 1, 2, 6, 7, 8];\n    const indicatorsTop = _topIdx.map(i => indicators[i]).filter(Boolean);\n\n    // peer table\n    const peerTable = d.peerTable.map(r => ({ ...r, color: tone(r.tone) }));\n\n    // findings\n    const kev = d.findings.kev.map(r => {\n      const rans = /ransom/i.test(r.flag);\n      const e = parseFloat(r.epss);\n      return {\n        ...r,\n        cveColor: rans ? TONE.critical : TONE.high,\n        epssColor: (isFinite(e) && e >= 0.93) ? TONE.critical : TONE.high,\n        flagBg: rans ? '#d62524' : 'rgba(58,51,38,0.12)',\n        flagColor: rans ? '#fff' : '#3a3326',\n      };\n    });\n    const dangling = d.findings.danglingDns.map(r => ({\n      ...r,\n      statusBg: r.tone === 'critical' ? '#d62524' : 'rgba(207,106,34,0.22)',\n      statusColor: r.tone === 'critical' ? '#fff' : '#3a3326',\n    }));\n    const emailRows = d.findings.email.rows.map(r => ({ ...r, color: tone(r.tone) }));\n    const serviceRows = d.findings.services.rows.map(r => ({ ...r, color: tone(r.tone) }));\n\n    // regulatory\n    const regStats = d.regulatory.stats.map(r => ({ ...r, color: tone(r.tone) }));\n\n    // action moves\n    const moves = d.actionPlan.moves.map((m, i) => ({\n      ...m,\n      num: String(i + 1).padStart(2, '0'),\n      numColor: tone(m.tone),\n      pillarWindowLabel: m.window + ' · ' + m.pillar,\n    }));\n    const toScoreNum = parseInt(String(d.actionPlan.toScore).replace(/[^0-9]/g, ''), 10);\n    const fromBand = bandFor(d.actionPlan.fromScore);\n    const toBand = isFinite(toScoreNum) ? bandFor(toScoreNum) : band;\n\n    // geography\n    const states = op.geographyStates || [];\n    const geographyList = states.length <= 1\n      ? (states[0] || '')\n      : states.slice(0, -1).join(', ') + ' and ' + states[states.length - 1];\n\n    // voice substitutions\n    const sub = str => (str || '')\n      .replace(/\\{INDUSTRY_N\\}/g, fmt(B.industryN))\n      .replace(/\\{PEER\\}/g, op.segmentShort)\n      .replace(/\\{COST_HIGH\\}/g, d.cost.headlineHigh);\n\n    const shortName = (op.legalName || '').replace(/,?\\s*(L\\.?L\\.?C\\.?|Inc\\.?|Corp\\.?|Co\\.?|Ltd\\.?)\\s*\\.?$/i, '').trim() || op.legalName;\n    const weightsStr = byWeight.map(p => p.name + ' ' + p.weight + '%').join(', ');\n\n    return {\n      ready: true, showActionPlan, showSolutions,\n\n      // meta / identity\n      confidentiality: d.meta.confidentiality,\n      industryLabel: d.meta.industryLabel,\n      assessedDate: d.meta.assessedDate,\n      reportYear: d.meta.reportYear,\n      legalName: op.legalName, shortName, domain: op.domain, frn: op.frn,\n      segmentLabel: op.segmentLabel, segmentName: op.segmentName, segmentShort: op.segmentShort,\n      revenueTier: op.revenueTier, geographyShort: op.geographyShort, geographyList,\n      statesCountWord: word(states.length),\n\n      // cover\n      coverKicker: d.voice.coverKicker,\n      coverSubtitle: sub(d.voice.coverSubtitle),\n      composite, bandLabel: band.label, bandLabelLower: band.label.toLowerCase(), bandColor: tone(band.tone),\n\n      // verdict\n      worstPillarName: pillarName(d.verdictTiles.worstPillar.pillarId),\n      worstPillarDetail: d.verdictTiles.worstPillar.detail,\n      activelyExploitedValue: d.verdictTiles.activelyExploited.value,\n      activelyExploitedDetail: d.verdictTiles.activelyExploited.detail,\n      brightSpotValue: d.verdictTiles.brightSpot.value,\n      brightSpotDetail: d.verdictTiles.brightSpot.detail,\n      industryMean: B.industryMean, industryMedian: B.industryMedian, p75: B.p75,\n      industryNFmt: fmt(B.industryN),\n      peerNFmt: fmt(B.peerN), peerLabel: B.peerLabel, peerCompositeAvg: B.peerCompositeAvg,\n      industryPct: pc.industryPct, peerPct: pc.peerPct,\n      industryWorseThanFmt: fmt(pc.industryWorseThan), peerWorseThanFmt: fmt(pc.peerWorseThan),\n      meanPct: B.industryMean, medianPct: B.industryMedian, compositePct: composite,\n      inversePct: 100 - pc.industryPct,\n\n      // §01\n      deltaVsMean: composite - B.industryMean,\n      gapToP75: B.p75 - composite,\n\n      // §02\n      saferFraction,\n\n      // §04\n      aboveCountWord: cap(word(aboveCount)),\n      pillarsLen: pillars.length,\n      top1Name: top2[0] ? top2[0].name : '', top1Score: top2[0] ? top2[0].score : '',\n      top2Name: top2[1] ? top2[1].name : '', top2Score: top2[1] ? top2[1].score : '',\n      combinedWeight,\n\n      // §06\n      failWord: word(failCount), indLen: indicators.length, indicatorsTop,\n\n      // §08\n      costHeadlineLow: d.cost.headlineLow, costHeadlineHigh: d.cost.headlineHigh,\n      costTotalLow: d.cost.totalLow, costTotalHigh: d.cost.totalHigh,\n\n      // §10\n      movesCountWord: cap(word(moves.length)),\n      fromScore: d.actionPlan.fromScore, toScore: d.actionPlan.toScore,\n      fromBandLabel: fromBand.label, fromBandColor: tone(fromBand.tone),\n      toBandLabel: toBand.label, toBandColor: tone(toBand.tone),\n\n      // §11\n      weightsStr,\n\n      // voice\n      peerPullQuote: d.voice.peerPullQuote,\n      winLosePullQuote: d.voice.winLosePullQuote,\n\n      // arrays\n      pillars, indicators, peerTable, kev, dangling, emailRows, serviceRows,\n      emailNote: d.findings.email.note, servicesNote: d.findings.services.note,\n      kevCount: kev.length, danglingCount: dangling.length,\n      costLines: d.cost.lines, regStats, moves,\n      winWorking: d.winLose.working, winExposing: d.winLose.exposing,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
